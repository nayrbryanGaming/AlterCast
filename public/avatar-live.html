/* ══════════════════════════════════════════════
   AI NATURAL MOTION BRAIN
   Multi-layer organic noise — drives body, head, breathing
   ══════════════════════════════════════════════ */
const Motion = {
  state: 'idle',  /* idle | talking | excited | listening */

  /* Layered sine noise: more natural than single frequency */
  noise(t, layers=[
    [1.0, 1.0],[2.3, 0.5],[0.37, 0.25],[5.1, 0.1],[0.17, 0.05]
  ]){
    return layers.reduce((s,[f,a])=>s+Math.sin(t*f)*a, 0) /
           layers.reduce((s,[,a])=>s+a, 0);
  },

  /* Body sway — slow organic drift */
  bodySwayX(t){ return this.noise(t,[
    [0.3,1],[0.7,0.4],[1.8,0.15],[0.11,0.1]]) * (this.state==='excited'?.012:.005); },
  bodySwayZ(t){ return this.noise(t+10,[
    [0.25,1],[0.6,0.35],[2.1,0.12]]) * (this.state==='excited'?.008:.003); },

  /* Breathing — chest rise */
  breatheY(t){ return (Math.sin(t*0.9)*0.6 + Math.sin(t*1.8)*0.2 + Math.sin(t*0.3)*0.2) *
    (this.state==='idle'?.007:.011); },

  /* Head micro-movement */
  headYaw(t){ return this.noise(t+3,[
    [0.22,1],[0.55,0.5],[1.3,0.2],[3.5,0.05]]) * (this.state==='talking'?.06:.03); },
  headPitch(t){ return this.noise(t+7,[
    [0.18,1],[0.45,0.45],[1.1,0.18]]) * (this.state==='talking'?.04:.02); },
  headRoll(t){ return this.noise(t+15,[
    [0.14,1],[0.38,0.4]]) * .015; },

  /* Weight shift — pelvis/hip sway */
  hipSway(t){ return Math.sin(t*0.19)*0.008 + Math.sin(t*0.41)*0.003; },

  /* Jaw open amount 0-1 */
  jawOpen(t){ return this.state==='talking'
    ? Math.max(0, Math.sin(t*9)*0.5 + Math.sin(t*13)*0.3 + Math.sin(t*7)*0.2)
    : Math.max(0, Math.sin(t*0.7)*0.08); },

  /* Eye blink — periodic natural blink */
  eyeBlink(t){
    const cycle = t % 4.2;
    if(cycle < 0.08) return cycle/0.08;
    if(cycle < 0.16) return 1-(cycle-0.08)/0.08;
    return 0;
  },

  /* Subtle eye look direction */
  eyeLookX(t){ return Math.sin(t*0.23)*0.15 + Math.sin(t*0.61)*0.05; },
  eyeLookY(t){ return Math.sin(t*0.19)*0.08 + Math.sin(t*0.44)*0.03; },

  /* Camera target drift — camera gently follows body */
  camDriftX(t){ return Math.sin(t*0.21)*0.06 + Math.sin(t*0.57)*0.02; },
  camDriftY(t){ return Math.sin(t*0.17)*0.04 + Math.sin(t*0.44)*0.015; },

  setState(s){ this.state=s; $('motion-hud').textContent = `AI MOTION · ${s.toUpperCase()}`; },
};

/* ══════════════════════════════════════════════
   CHARACTER SYSTEM
   ══════════════════════════════════════════════ */
let currentChar = null, currentMixer = null, currentCharKey = null;
let charInfoBox = null;  /* bounding box info */

/* Material upgrade */
function upgradeMat(mat, meshName=''){
  if(!mat) return mat;
  const n = ((mat.name||'')+' '+meshName).toLowerCase();
  if(mat.color && mat.color.getHex()===0xffffff && !mat.map){
    if(['skin','face','body','head','neck','hand','arm','leg'].some(k=>n.includes(k)))
      mat.color.setHex(0xF5C5A3);
  }
  if(mat.envMapIntensity!==undefined) mat.envMapIntensity=0.5;
  if(['eye','iris','cornea','pupil'].some(k=>n.includes(k))){
    if(mat.roughness!==undefined) mat.roughness=0.08;
    if(mat.metalness!==undefined) mat.metalness=0.18;
  }
  if(['hair','eyebrow','eyelash'].some(k=>n.includes(k))){
    mat.side=THREE.DoubleSide;
    if(mat.roughness!==undefined) mat.roughness=0.6;
  }
  if(mat.isMeshBasicMaterial && !mat.transparent){
    return new THREE.MeshStandardMaterial({
      map:mat.map, color:mat.color, alphaMap:mat.alphaMap,
      transparent:mat.transparent, side:mat.side||THREE.FrontSide,
      roughness:0.7, metalness:0,
    });
  }
  mat.needsUpdate=true;
  return mat;
}

/* Bone search helper */
function findBone(obj, names){
  let found=null;
  obj.traverse(n=>{
    if(found) return;
    const ln=(n.name||'').toLowerCase();
    if(names.some(k=>ln.includes(k))) found=n;
  });
  return found;
}

async function loadChar(key){
  if(!CHARS[key]) return;

  /* Dispose previous */
  if(currentChar){
    scene.remove(currentChar);
    currentChar.traverse(n=>{
      if(n.geometry) n.geometry.dispose();
      if(n.material){
        [].concat(n.material).forEach(m=>{
          Object.values(m).forEach(v=>{if(v?.isTexture)v.dispose();});
          m.dispose();
        });
      }
    });
    currentChar=null; currentMixer=null; charInfoBox=null;
    headBone=null; hipBone=null; spineBone=null;
  }

  $('err').classList.remove('show');
  $('loading').classList.remove('hide');
  $('loading').style.display='flex';
  prog(5); log(`Memuat ${CHARS[key].label}...`);
  currentCharKey=key;

  /* Highlight button */
  document.querySelectorAll('.ch').forEach(b=>b.classList.toggle('on',b.dataset.key===key));

  return new Promise((resolve,reject)=>{
    const loader = new GLTFLoader();
    loader.load(CHARS[key].url, gltf=>{
      log('Memproses material...'); prog(80);
      const obj = gltf.scene;
      obj.traverse(n=>{
        if(!n.isMesh) return;
        n.castShadow=true; n.receiveShadow=true;
        n.material = Array.isArray(n.material)
          ? n.material.map(m=>upgradeMat(m,n.name))
          : upgradeMat(n.material,n.name);
      });

      /* Auto-scale to ~1.7 units height */
      const box=new THREE.Box3().setFromObject(obj);
      const sz=box.getSize(new THREE.Vector3());
      const maxDim=Math.max(sz.x,sz.y,sz.z);
      const scale = maxDim>0 ? 1.7/maxDim : 1;
      obj.scale.setScalar(scale);
      const box2=new THREE.Box3().setFromObject(obj);
      const cen2=box2.getCenter(new THREE.Vector3());
      obj.position.x -= cen2.x;
      obj.position.z -= cen2.z;
      obj.position.y -= box2.min.y;
      obj.userData.baseY = obj.position.y;

      scene.add(obj);
      currentChar=obj;
      charInfoBox = { box:box2, center:cen2, size:sz };

      /* Search bones for AI motion */
      headBone  = findBone(obj,['head','skull','neck_01','neck1']);
      hipBone   = findBone(obj,['hips','pelvis','hip','root','bip01']);
      spineBone = findBone(obj,['spine','chest','torso']);
      jawBone   = findBone(obj,['jaw','jaw_lower','lowerjaw','chin','mandible']);
      eyeLBone  = findBone(obj,['eye_l','eyeleft','eye.l','lefteye','l_eye']);
      eyeRBone  = findBone(obj,['eye_r','eyeright','eye.r','righteye','r_eye']);

      /* Collect morph target meshes (jaw, eyes, face expressions) */
      morphMeshes=[];
      obj.traverse(n=>{
        if(n.isMesh && n.morphTargetDictionary && Object.keys(n.morphTargetDictionary).length>0){
          morphMeshes.push(n);
        }
      });
      isProcedural=false;

      /* Animations */
      if(gltf.animations?.length){
        currentMixer=new THREE.AnimationMixer(obj);
        const clip=THREE.AnimationClip.findByName(gltf.animations,'idle') || gltf.animations[0];
        const action=currentMixer.clipAction(clip);
        action.timeScale=0.85;
        action.play();
      }

      /* Apply cam */
      applyCam(currentCamPreset);
      prog(100); log('Avatar siap!');
      setTimeout(()=>{$('loading').classList.add('hide');setTimeout(()=>$('loading').style.display='none',700);},200);
      $('status').textContent = `HOLO · ${CHARS[key].label} · ${key.replace('c','')}/${CHAR_KEYS.length}`;
      resolve(obj);
    }, p=>{
      const pct = p.total ? Math.round(p.loaded/p.total*72)+5 : 50;
      prog(pct); log(`${CHARS[key].label}: ${pct}%`);
    }, err=>{
      console.warn('Load fail, using procedural fallback:',key, err.message);
      loadProceduralChar(key);
      resolve(null);
    });
  });
}

/* ══════════════════════════════════════════════
   PROCEDURAL HUMANOID — always works, no GLB needed
   Proves AI motion system even when files not hosted
   ══════════════════════════════════════════════ */
function loadProceduralChar(key){
  /* Dispose previous */
  if(currentChar){
    scene.remove(currentChar);
    currentChar.traverse(n=>{ if(n.geometry)n.geometry.dispose(); });
    currentChar=null; currentMixer=null;
    headBone=null; hipBone=null; spineBone=null;
    jawBone=null; eyeLBone=null; eyeRBone=null;
    morphMeshes=[];
  }
  isProcedural=true;
  $('err').classList.remove('show');
  $('loading').classList.add('hide');
  setTimeout(()=>$('loading').style.display='none',300);

  const root = new THREE.Group();
  const skinMat  = new THREE.MeshStandardMaterial({color:0xF5C5A3,roughness:.6,metalness:0});
  const clothMat = new THREE.MeshStandardMaterial({color:0x1a2540,roughness:.7,metalness:.08});

  const eyeWhMat = new THREE.MeshStandardMaterial({color:0xFFFFFF,roughness:.1,metalness:0});
  const eyeIrisMat=new THREE.MeshStandardMaterial({color:0x1155BB,roughness:.08,metalness:.1});
  const pupilMat = new THREE.MeshStandardMaterial({color:0x050505,roughness:.1,metalness:.05});

  const mk=(geo,mat,px=0,py=0,pz=0)=>{
    const m=new THREE.Mesh(geo,mat); m.position.set(px,py,pz);
    m.castShadow=true; return m;
  };

  /* TORSO */
  const torsoGroup=new THREE.Group(); torsoGroup.position.y=1.05;
  torsoGroup.add(mk(new THREE.BoxGeometry(.32,.52,.18),clothMat,0,0,0));
  root.add(torsoGroup); spineBone=torsoGroup;

  /* HIP */
  const hipGroup=new THREE.Group(); hipGroup.position.y=0.78;
  hipGroup.add(mk(new THREE.BoxGeometry(.30,.22,.16),clothMat));
  root.add(hipGroup); hipBone=hipGroup;

  /* LEGS */
  const mkLeg=(sx)=>{
    const lg=new THREE.Group(); lg.position.set(sx*.12,.55,0);
    lg.add(mk(new THREE.CylinderGeometry(.065,.075,.42,10),clothMat,0,0,0));
    lg.add(mk(new THREE.CylinderGeometry(.055,.065,.40,10),clothMat,0,-.42,0));
    lg.add(mk(new THREE.BoxGeometry(.11,.06,.18),skinMat,0,-.65,.04));
    root.add(lg);
  };
  mkLeg(-1); mkLeg(1);

  /* ARMS */
  const mkArm=(sx)=>{
    const ag=new THREE.Group(); ag.position.set(sx*.21,1.20,0);
    ag.add(mk(new THREE.CylinderGeometry(.045,.055,.32,8),clothMat,0,0,0));
    ag.add(mk(new THREE.CylinderGeometry(.035,.045,.28,8),skinMat,0,-.31,0));
    ag.add(mk(new THREE.SphereGeometry(.04,6,6),skinMat,0,-.48,0));
    root.add(ag);
  };
  mkArm(-1); mkArm(1);

  /* NECK */
  const neckGroup=new THREE.Group(); neckGroup.position.y=1.35;
  neckGroup.add(mk(new THREE.CylinderGeometry(.055,.065,.14,10),skinMat));
  root.add(neckGroup);

  /* HEAD GROUP */
  const headGroup=new THREE.Group(); headGroup.position.y=1.57;
  const headMesh=mk(new THREE.SphereGeometry(.14,18,14),skinMat,0,.02,0);
  headGroup.add(headMesh);

  /* HAIR */
  headGroup.add(mk(new THREE.SphereGeometry(.148,16,12),hairMat,0,.06,0));
  const hairFront=mk(new THREE.BoxGeometry(.29,.06,.1),hairMat,0,.16,0.08);
  headGroup.add(hairFront);

  /* EYES */
  const mkEye=(sx)=>{
    const eg=new THREE.Group(); eg.position.set(sx*.055,.04,.12);
    eg.add(mk(new THREE.SphereGeometry(.028,10,8),eyeWhMat));
    eg.add(mk(new THREE.SphereGeometry(.018,8,7),eyeIrisMat,0,0,.016));
    eg.add(mk(new THREE.SphereGeometry(.011,8,7),pupilMat,0,0,.026));
    /* Upper eyelid (lid that closes) */
    const lid=mk(new THREE.BoxGeometry(.06,.012,.006),new THREE.MeshStandardMaterial({color:0xE8B4A0,roughness:.6}),0,.022,.024);
    eg.add(lid);
    eg.userData.lid=lid;
    return eg;
  };
  const eyeLG=mkEye(-1), eyeRG=mkEye(1);
  headGroup.add(eyeLG); headGroup.add(eyeRG);
  eyeLBone=eyeLG; eyeRBone=eyeRG;
  procEyeL=eyeRG.userData.lid; procEyeR=eyeRG.userData.lid;

  /* NOSE */
  headGroup.add(mk(new THREE.ConeGeometry(.018,.04,6),skinMat,0,-.01,.13));

  /* UPPER LIP */
  headGroup.add(mk(new THREE.BoxGeometry(.075,.016,.008),skinMat,0,-.07,.13));

  /* JAW GROUP — rotates for mouth open/close */
  const jawGroup=new THREE.Group(); jawGroup.position.set(0,-.065,.06);
  jawGroup.add(mk(new THREE.BoxGeometry(.09,.03,.12),skinMat,0,-.012,-.03));
  jawGroup.add(mk(new THREE.BoxGeometry(.062,.016,.008),skinMat,0,-.02,.08)); /* lower lip */
  headGroup.add(jawGroup); jawBone=jawGroup; procJaw=jawGroup;

  root.add(headGroup); headBone=headGroup;

  /* LABEL */
  const label=CHARS[key]?.label||'Procedural';
  const canvas2d=document.createElement('canvas'); canvas2d.width=256; canvas2d.height=64;
  const ctx2=canvas2d.getContext('2d');

  const spr=new THREE.Sprite(sprMat); spr.scale.set(.9,.23,1); spr.position.y=2.0;
  root.add(spr);

  /* Auto-scale & center same as GLB */
  const box=new THREE.Box3().setFromObject(root);
  const sz=box.getSize(new THREE.Vector3());
  const scl=1.7/Math.max(sz.x,sz.y,sz.z);
  root.scale.setScalar(scl);
  const box2=new THREE.Box3().setFromObject(root);
  root.position.y -= box2.min.y;
  root.userData.baseY=root.position.y;

  scene.add(root);
  currentChar=root;
  applyCam(currentCamPreset);
  $('status').textContent=`HOLO · ${label} · AI:PROCEDURAL`;
  currentCharKey=key;
  document.querySelectorAll('.ch').forEach(b=>b.classList.toggle('on',b.dataset.key===key));
}

/* ══════════════════════════════════════════════
   CAMERA PRESETS + AUTO-TRACKING
   ══════════════════════════════════════════════ */
let currentCamPreset='bust', spinSpeed=0;
let headBone=null, hipBone=null, spineBone=null;
let jawBone=null, eyeLBone=null, eyeRBone=null;
let morphMeshes=[]; /* meshes with morph targets */
let isProcedural=false; /* true when showing built-in fallback */
let procJaw=null, procEyeL=null, procEyeR=null; /* procedural part refs */

/* Camera soft-tracking target (lerped) */
const camTargetLook = new THREE.Vector3(0,0.9,0);
const camTargetPos  = new THREE.Vector3(0,1.0,3.5);

function applyCam(preset){
  if(!currentChar) return;
  const box=new THREE.Box3().setFromObject(currentChar);
  const cen=box.getCenter(new THREE.Vector3());
  const sz=box.getSize(new THREE.Vector3()); const h=sz.y;
  let target,dist,fov;
  if(preset==='face'){
    target=new THREE.Vector3(cen.x,cen.y+h*.44,cen.z); dist=h*.65; fov=20;
  } else if(preset==='full'){
    target=new THREE.Vector3(cen.x,cen.y,cen.z); dist=h*1.5; fov=30;
  } else { /* bust */
    target=new THREE.Vector3(cen.x,cen.y+h*.16,cen.z); dist=h*1.55; fov=30;
  }
  ctl.target.copy(target);
  camTargetLook.copy(target);
  camera.position.set(0,target.y+h*.04,dist);
  camTargetPos.copy(camera.position);
  camera.fov=fov; camera.updateProjectionMatrix();
  ctl.update();
  currentCamPreset=preset;
}

function startAuto(){
  autoCycle=true;

  scheduleNext(false);
}
function stopAuto(){
  autoCycle=false;

  $('auto-btn').classList.remove('on');
  clearTimeout(autoTimer);
  $('auto-bar').style.width='0%';
  $('auto-bar').style.transition='none';
}
function scheduleNext(advance=true){
  clearTimeout(autoTimer);
  if(advance){ autoIdx=(autoIdx+1)%CHAR_KEYS.length; }
  const key=CHAR_KEYS[autoIdx];
  loadChar(key).catch(()=>scheduleNext(true));
  $('auto-bar').style.transition='none'; $('auto-bar').style.width='0%';
  requestAnimationFrame(()=>{
    $('auto-bar').style.transition=`width ${AUTO_INTERVAL}ms linear`;
    $('auto-bar').style.width='100%';
  });
  autoBarStart=Date.now();
  autoTimer=setTimeout(()=>{ if(autoCycle) scheduleNext(true); }, AUTO_INTERVAL);
}

/* ══════════════════════════════════════════════
   RENDER LOOP
   ══════════════════════════════════════════════ */
const clock=new THREE.Clock();
let fps=0,fF=0,fT=performance.now();
let isTalking=false;

function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  const t=clock.getElapsedTime();

  /* Floor pulse */
  floorMat.opacity=0.14+Math.sin(t*1.1)*.06;

  /* Rings */
  ringGroup.children.forEach(r=>{
    r.rotation.z+=r.userData.spd*dt;
    r.position.y=0.015+r.userData.r*.004+Math.sin(t+r.userData.r*2.5)*.018;
  });

  /* AI NATURAL MOTION on character */
  if(currentChar){
    /* Body sway */
    currentChar.rotation.z = Motion.bodySwayX(t);
    currentChar.rotation.x = Motion.bodySwayZ(t);
    /* Breathing — vertical float */
    currentChar.position.y = (currentChar.userData.baseY||0) + Motion.breatheY(t);
    /* Hip sway */
    currentChar.position.x = Motion.hipSway(t);

    /* Head bone micro-motion */
    if(headBone){
      headBone.rotation.y = Motion.headYaw(t);
      headBone.rotation.x = Motion.headPitch(t);
      headBone.rotation.z = Motion.headRoll(t);
    }
    /* Spine gentle sway */
    if(spineBone){
      spineBone.rotation.z = Motion.bodySwayX(t) * 0.4;
      spineBone.rotation.x = Motion.bodySwayZ(t) * 0.3;
    }
    /* Hip bone sway */
    if(hipBone){
      hipBone.rotation.z = Motion.hipSway(t) * 0.5;
    }

    /* JAW BONE — mouth open/close */
    const jaw = Motion.jawOpen(t);
    if(jawBone){
      jawBone.rotation.x = jaw * 0.28; /* max ~16 degrees */
    }

    /* EYE BONES — look direction */
    const blk = Motion.eyeBlink(t);
    const elx = Motion.eyeLookX(t), ely = Motion.eyeLookY(t);
    if(eyeLBone){ eyeLBone.rotation.y = elx; eyeLBone.rotation.x = ely; }
    if(eyeRBone){ eyeRBone.rotation.y = elx; eyeRBone.rotation.x = ely; }

    /* PROCEDURAL eyelid close */
    if(isProcedural){
      if(procEyeL){ procEyeL.scale.y = 1 + blk*5; procEyeL.position.y = 0.022 - blk*0.016; }
      if(procEyeR){ procEyeR.scale.y = 1 + blk*5; procEyeR.position.y = 0.022 - blk*0.016; }
    }

    /* MORPH TARGETS — drive jaw/eye blend shapes on GLB characters */
    morphMeshes.forEach(mesh=>{
      const d=mesh.morphTargetDictionary;
      const infl=mesh.morphTargetInfluences;
      const set=(names,v)=>{ names.forEach(n=>{ if(d[n]!==undefined) infl[d[n]]=Math.max(0,Math.min(1,v)); }); };
      /* Jaw / mouth */
      set(['jawOpen','mouthOpen','Mouth_Open','jaw_open','A'],jaw);
      /* Eye blink */
      set(['eyeBlinkLeft','blink_L','eyesClosed_L','Eye_Blink_L'],blk);
      set(['eyeBlinkRight','blink_R','eyesClosed_R','Eye_Blink_R'],blk);
      /* Eye look */
      set(['eyeLookUpLeft','eyeLookUpRight'],Math.max(0,-ely));
      set(['eyeLookDownLeft','eyeLookDownRight'],Math.max(0,ely));
      set(['eyeLookInLeft','eyeLookOutRight'],Math.max(0,elx));
      set(['eyeLookOutLeft','eyeLookInRight'],Math.max(0,-elx));
    });

    /* Camera soft-tracking — follow head/body drift gently */
    if(spinSpeed===0 && !ctl.autoRotate){
      const driftX = Motion.camDriftX(t) * 0.015;
      const driftY = Motion.camDriftY(t) * 0.010;
      ctl.target.x += (camTargetLook.x + driftX - ctl.target.x) * 0.012;
      ctl.target.y += (camTargetLook.y + driftY - ctl.target.y) * 0.010;
    }
  }

  /* Auto-rotate */
  ctl.autoRotateSpeed=spinSpeed;
  ctl.update();
  if(currentMixer) currentMixer.update(dt);
  renderer.render(scene,camera);

  fF++;
  const now=performance.now();
  if(now-fT>=1000){
    fps=fF; fF=0; fT=now;
    if(currentChar){
      $('status').textContent=`HOLO · ${fps}FPS · ${CHARS[currentCharKey]?.label||'OK'} · AI:${Motion.state.toUpperCase()}`;
    }
  }
}
animate();

/* ══════════════════════════════════════════════
   UI WIRING
   ══════════════════════════════════════════════ */
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

document.querySelectorAll('[data-bg]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('[data-bg]').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); setBg(b.dataset.bg);
}));

document.querySelectorAll('[data-cam]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('[data-cam]').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); applyCam(b.dataset.cam);
}));

document.querySelectorAll('[data-spin]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('[data-spin]').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  spinSpeed={off:0,slow:0.55,fast:2.4}[b.dataset.spin];
  ctl.autoRotate=spinSpeed!==0;
}));

$('auto-btn').addEventListener('click',()=>{ autoCycle?stopAuto():startAuto(); });
$('err-next').addEventListener('click',()=>{ $('err').classList.remove('show'); scheduleNext(true); });

/* TTS */
const sc=$('sc'), rdBtn=$('rd'), stBtn=$('st'), bub=$('bub');
function readScript(txt){
  if(!txt.trim()) return;
  window.speechSynthesis.cancel();
  isTalking=true; Motion.setState('talking');
  rdBtn.style.display='none'; stBtn.style.display='inline-block';
  bub.textContent=txt.length>80?txt.slice(0,80)+'...':txt;
  bub.classList.add('show');
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='id-ID'; u.rate=1.05;
  u.onend=stopTTS;
  window.speechSynthesis.speak(u);
}
function stopTTS(){
  window.speechSynthesis.cancel();
  isTalking=false; Motion.setState('idle');
  rdBtn.style.display='inline-block'; stBtn.style.display='none';
  bub.classList.remove('show');
}
rdBtn.addEventListener('click',()=>readScript(sc.value));
stBtn.addEventListener('click',stopTTS);
sc.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();readScript(sc.value);} e.stopPropagation(); });

/* AI button */
$('ai-btn').addEventListener('click',async()=>{
  const txt=sc.value.trim(); if(!txt) return;
  const btn=$('ai-btn'); btn.textContent='...';
  Motion.setState('listening');
  try{
    const r=await window.claude?.complete(`Kamu AI streamer santai. Balas chat berikut dalam 1-2 kalimat singkat dan ekspresif: "${txt}"`);
    if(r){ sc.value=r; readScript(r); }
  }catch(e){ Motion.setState('idle'); }
  btn.textContent='AI';
});

/* Comments */
const cmtsEl=$('cmts');
function addCmt(user,text,color='#00D4FF'){
  const el=document.createElement('div');
  el.className='cmt'; el.style.borderLeft=`3px solid ${color}`;
  el.innerHTML=`<div class="cmt-av" style="background:${color}">${user[0].toUpperCase()}</div><div><div class="cmt-u" style="color:${color}">${user}</div><div class="cmt-t">${text}</div></div>`;
  cmtsEl.prepend(el);
  while(cmtsEl.children.length>6) cmtsEl.lastElementChild.remove();
  setTimeout(()=>el.remove(),9000);
}
setTimeout(()=>{
  [['Nayr','#00D4FF','Avatar-nya keren banget!'],['viewer02','#7C3AFF','Bisa ganti karakter lain?'],['livefan','#00FF88','164 karakter mantap!']]
    .forEach(([u,c,t],i)=>setTimeout(()=>addCmt(u,t,c),(i+1)*2400));
},2000);

/* Controls visibility */
let hideT;
const ctrlEl=$('ctrl'), cpEl=$('char-panel'), wmEl=$('wm'), mhEl=$('motion-hud');
function showCtrl(){
  ctrlEl.classList.add('show'); cpEl.classList.add('show');
  wmEl.classList.add('hide'); mhEl.classList.remove('hide');
  clearTimeout(hideT);
  hideT=setTimeout(()=>{
    ctrlEl.classList.remove('show'); cpEl.classList.remove('show');
    wmEl.classList.remove('hide'); mhEl.classList.add('hide');
  },5000);
}
document.addEventListener('mousemove',showCtrl);
document.addEventListener('keydown',showCtrl);
document.addEventListener('touchstart',showCtrl);
setTimeout(showCtrl,800);

/* Back */
$('bk').addEventListener('click',()=>{
  window.parent?.postMessage({type:'PERFORMER_BACK'},'*');
  if(window.parent===window) window.history.back();
});

/* postMessage API */
window.addEventListener('message',e=>{
  const {type,data}=e.data||{};
  if(type==='READ_SCRIPT')  readScript(data.text);
  if(type==='STOP_TTS')     stopTTS();
  if(type==='ADD_COMMENT')  addCmt(data.user,data.text,data.color||'#00D4FF');
  if(type==='SET_BG')       setBg(data.bg);
  if(type==='SET_CHAR'){
    const idx=CHAR_KEYS.findIndex(k=>CHARS[k].file===data.char||CHARS[k].label===data.char);
    if(idx>=0) loadChar(CHAR_KEYS[idx]).catch(()=>{});
  }
  if(type==='NEXT_CHAR') scheduleNext(true);
  if(type==='AUTO_CYCLE') { data.on?startAuto():stopAuto(); }
  if(type==='SET_MOTION') Motion.setState(data.state||'idle');
});

/* ══════════════════════════════════════════════
   INIT — load first character
   ══════════════════════════════════════════════ */
loadChar(CHAR_KEYS[0]).then(()=>{
  autoIdx=0;
  window.parent?.postMessage({type:'AVATAR_READY',data:{total:CHAR_KEYS.length}},'*');
}).catch(()=>{ autoIdx=1; scheduleNext(false); });
