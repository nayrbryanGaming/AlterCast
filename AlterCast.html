                    <>
                      <input type="time" value={s.start} onChange={e=>setSchedule(p=>p.map((x,j)=>j===i?{...x,start:e.target.value}:x))}
                        style={{background:"var(--bg-overlay)",border:"1px solid var(--border-normal)",borderRadius:"var(--r-sm)",padding:"4px 8px",color:"var(--text-primary)",fontSize:"var(--text-xs)",fontFamily:"var(--font-mono)",cursor:"pointer"}}/>

          {/* Settings */}
          <div style={{display:"flex", flexDirection:"column", gap:"14px"}}>
            <Panel title={lang==="id"?"Pengaturan":"Settings"} icon={<IcSettings size={13}/>}>
              <div style={{padding:"14px 16px", display:"flex", flexDirection:"column", gap:"12px"}}>
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:"var(--text-sm)", fontWeight:600}}>{lang==="id"?"Auto-Start":"Auto-Start"}</div>
                    <div style={{fontSize:"var(--text-xs)", color:"var(--text-muted)"}}>{lang==="id"?"Mulai stream otomatis":"Auto-start stream"}</div>
                  </div>
                  <Toggle checked={autoStart} onChange={v=>{setAutoStart(v);addToast(v?(lang==="id"?"Auto-start aktif!":"Auto-start on!"):(lang==="id"?"Auto-start nonaktif":"Auto-start off"),"info");}} />

                </FormField>
                <FormField label="Timezone">
                  <Select value={timezone} onChange={setTimezone} options={[
                    {value:"Asia/Jakarta",   label:"WIB (UTC+7)"},

                    {value:"Asia/Jayapura",  label:"WIT (UTC+9)"},

            <Button variant="primary" fullWidth icon={<IcCheck/>} onClick={()=>addToast(lang==="id"?"Jadwal disimpan!":"Schedule saved!","success")}>

    </div>
  );

  const { lang, isLive, addToast } = useApp();

    { id:1, title:"Momen Donasi Gede!", dur:"0:32", ts:"16 Mei 12:05", views:248, thumb:"[HOT]", tags:["donasi","highlight"] },
    { id:2, title:"AI Jawab Pertanyaan Lucu",dur:"1:14", ts:"16 Mei 11:42", views:182, thumb:"[LOL]", tags:["ai","funny"] },
    { id:3, title:"Game Over Dramatis",      dur:"0:48", ts:"15 Mei 20:31", views:97,  thumb:"[GAME]", tags:["game","fail"] },
    { id:4, title:"Chat Ramai Banget!",      dur:"0:22", ts:"15 Mei 20:10", views:134, thumb:"[CHAT]", tags:["chat"] },
    { id:5, title:"Salam Pembuka Stream",    dur:"2:05", ts:"14 Mei 19:00", views:310, thumb:"", tags:["intro"] },
  ]);
  const [recording, setRecording] = React.useState(false);
  const [recordTimer, setRecordTimer] = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [autoClip, setAutoClip] = React.useState(true);
  const [clipTrigger, setClipTrigger] = React.useState("donation");

  React.useEffect(() => {
    if (!recording) { setRecordTimer(0); return; }
    const iv = setInterval(() => setRecordTimer(t => t + 1), 1000);
    return () => clearInterval(iv);
  }, [recording]);

  const fmt = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

  const startClip = () => {
    setRecording(true);
    setTimeout(() => {
      setRecording(false);
      const newClip = { id: Date.now(), title: lang==="id"?"Clip Baru":"New Clip", dur: fmt(30), ts: new Date().toLocaleString("id-ID"), views: 0, thumb: "️", tags: ["manual"] };
      setClips(p => [newClip, ...p]);
      addToast(lang==="id"?"Clip tersimpan!":"Clip saved!", "success");
    }, 5000);
  };

  return (
    <div style={{ flex:1, overflow:"auto", padding:"24px", background:"var(--bg-base)" }}>
      <div style={{ maxWidth:"1100px", margin:"0 auto", display:"flex", flexDirection:"column", gap:"20px" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", flexWrap:"wrap", gap:"12px" }}>
          <div>
            <h1 style={{ fontSize:"var(--text-2xl)", fontWeight:800, letterSpacing:"-0.02em" }}>️ {lang==="id"?"Clip Studio":"Clip Studio"}</h1>
            <p style={{ color:"var(--text-secondary)", fontSize:"var(--text-sm)", marginTop:"4px" }}>{lang==="id"?"Rekam, edit, dan bagikan highlight terbaik stream kamu":"Record, edit, and share your best stream highlights"}</p>
          </div>
          <div style={{ display:"flex", gap:"8px" }}>
            <Button variant={recording?"live":"primary"} size="md" icon={recording?<IcSquare/>:<IcCircle/>}
              onClick={recording?()=>setRecording(false):startClip}>
              {recording?`${lang==="id"?"Stop":"Stop"} ${fmt(recordTimer)}`:(lang==="id"?"Rekam Clip":"Record Clip")}
            </Button>
          </div>
        </div>

        {/* Recording banner */}
        {recording && (
          <div style={{ background:"rgba(255,60,60,0.1)", border:"1px solid rgba(255,60,60,0.35)", borderRadius:"var(--r-lg)", padding:"12px 20px", display:"flex", alignItems:"center", gap:"12px", animation:"pulse-live 1.6s ease infinite" }}>
            <StatusDot status="live" pulse size={10}/>
            <span style={{ fontWeight:700, color:"var(--status-live)" }}>{lang==="id"?"Sedang merekam clip...":"Recording clip..."} {fmt(recordTimer)}</span>
            <span style={{ color:"var(--text-muted)", fontSize:"var(--text-sm)" }}>{lang==="id"?"Max 60 detik":"Max 60 seconds"}</span>
          </div>
        )}

        {/* Auto-clip settings */}
        <Panel title={lang==="id"?"Auto Clip":"Auto Clip"} icon={<IcZap size={13}/>}
          actions={<Toggle checked={autoClip} onChange={setAutoClip} size="sm"/>}>
          <div style={{ padding:"14px 16px", display:"flex", gap:"16px", alignItems:"center", flexWrap:"wrap" }}>
            <span style={{ fontSize:"var(--text-sm)", color:"var(--text-secondary)" }}>
              {lang==="id"?"Clip otomatis saat:":"Auto-clip when:"}
            </span>
            <Select value={clipTrigger} onChange={setClipTrigger} style={{ width:"200px" }} options={[
              { value:"donation", label:lang==="id"?"Ada Donasi":"Donation received" },
              { value:"hype",     label:lang==="id"?"Chat ramai (>20/min)":"Chat spike (>20/min)" },
              { value:"sub",      label:lang==="id"?"Subscriber baru":"New subscriber" },
              { value:"keyword",  label:lang==="id"?"Kata tertentu di chat":"Keyword in chat" },
            ]}/>
            {autoClip && <Badge variant="primary" size="sm">Active</Badge>}
          </div>
        </Panel>

        {/* Clips grid */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))", gap:"14px" }}>
          {clips.map(clip => (
            <div key={clip.id}
              onClick={() => setSelected(selected===clip.id?null:clip.id)}
              style={{
                background:"var(--bg-surface)", borderRadius:"var(--r-lg)", overflow:"hidden",
                border:`2px solid ${selected===clip.id?"var(--border-accent)":"var(--border-subtle)"}`,
                cursor:"pointer", transition:"all var(--t-fast)",
                boxShadow: selected===clip.id?"var(--shadow-glow-cyan)":"var(--shadow-sm)",
              }}
              onMouseOver={e=>selected!==clip.id&&(e.currentTarget.style.borderColor="var(--border-normal)")}
              onMouseOut={e=>selected!==clip.id&&(e.currentTarget.style.borderColor="var(--border-subtle)")}
            >
              {/* Thumbnail */}
              <div style={{ height:"120px", background:`radial-gradient(ellipse at 50% 50%, rgba(0,212,255,0.08), var(--bg-void))`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"3rem", position:"relative" }}>
                {clip.thumb}
                <div style={{ position:"absolute", bottom:"8px", right:"8px" }}>
                  <Tag color="cyan">{clip.dur}</Tag>
                </div>
              </div>
              <div style={{ padding:"12px" }}>
                <div style={{ fontWeight:700, fontSize:"var(--text-sm)", marginBottom:"4px" }}>{clip.title}</div>
                <div style={{ fontSize:"0.65rem", color:"var(--text-muted)", marginBottom:"8px", fontFamily:"var(--font-mono)" }}>{clip.ts}</div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <div style={{ display:"flex", gap:"4px", flexWrap:"wrap" }}>
                    {clip.tags.map(t=><Tag key={t} color="cyan">{t}</Tag>)}
                  </div>
                  <span style={{ fontSize:"var(--text-xs)", color:"var(--text-muted)" }}>[CAM] {clip.views}</span>
                </div>
                {selected===clip.id && (
                  <div style={{ display:"flex", gap:"6px", marginTop:"10px", animation:"slide-down 0.2s ease" }}>
                    <Button variant="primary" size="xs" fullWidth icon={<IcDownload size={11}/>}>{lang==="id"?"Unduh":"Download"}</Button>
                    <Button variant="surface" size="xs" icon={<IcShare2 size={11}/>}>{lang==="id"?"Bagikan":"Share"}</Button>
                    <IconButton icon={<IcX size={11}/>} size="sm" onClick={e=>{e.stopPropagation();setClips(p=>p.filter(c=>c.id!==clip.id));}}/>
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function SongQueuePage() {
  const { lang, isLive, addToast } = useApp();
  const [queue, setQueue] = React.useState([
    { id:1, song:"Bohemian Rhapsody", artist:"Queen",        req:"StreamerX",   dur:"5:55", platform:"youtube", votes:12 },
    { id:2, song:"Blinding Lights",   artist:"The Weeknd",   req:"anime_fan99", dur:"3:20", platform:"spotify", votes:8  },
    { id:3, song:"Shape of You",      artist:"Ed Sheeran",   req:"tech_wizard", dur:"3:54", platform:"youtube", votes:5  },
    { id:4, song:"Levitating",        artist:"Dua Lipa",     req:"luna_chan",   dur:"3:23", platform:"spotify", votes:3  },
  ]);
  const [playing, setPlaying] = React.useState({ song:"Night Changes", artist:"One Direction", dur:"3:54", elapsed:82 });
  const [allowReq, setAllowReq] = React.useState(true);
  const [maxQueue, setMaxQueue] = React.useState(10);
  const [subOnly, setSubOnly] = React.useState(false);
  const [newSong, setNewSong] = React.useState("");

  const skip = () => {
    if (queue.length === 0) return;
    setPlaying({ song:queue[0].song, artist:queue[0].artist, dur:queue[0].dur, elapsed:0 });
    setQueue(p => p.slice(1));
    addToast(lang==="id"?"Lagu dilewati":"Song skipped", "default");
  };

  const addSong = () => {
    if (!newSong.trim()) return;
    setQueue(p => [...p, { id:Date.now(), song:newSong, artist:"Unknown", req:lang==="id"?"Streamer":"Streamer", dur:"3:30", platform:"manual", votes:0 }]);
    setNewSong("");
    addToast(lang==="id"?"Lagu ditambahkan!":"Song added!", "success");
  };

  const pct = playing ? Math.min(100, (playing.elapsed / 234) * 100) : 0;

  return (
    <div style={{ flex:1, overflow:"auto", padding:"24px", background:"var(--bg-base)" }}>
      <div style={{ maxWidth:"900px", margin:"0 auto", display:"flex", flexDirection:"column", gap:"20px" }}>
        <div>
          <h1 style={{ fontSize:"var(--text-2xl)", fontWeight:800, letterSpacing:"-0.02em" }}>[MUS] Song Queue</h1>
          <p style={{ color:"var(--text-secondary)", fontSize:"var(--text-sm)", marginTop:"4px" }}>{lang==="id"?"Kelola request lagu dari penonton":"Manage song requests from viewers"}</p>
        </div>

        {/* Now playing */}
        <div style={{ background:"linear-gradient(135deg, rgba(0,212,255,0.1), rgba(124,58,255,0.06))", border:"1px solid var(--border-accent)", borderRadius:"var(--r-xl)", padding:"20px" }}>
          <div style={{ fontSize:"var(--text-xs)", color:"var(--text-muted)", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:"10px" }}>
            {lang==="id"?"[MUS] Sedang Diputar":"[MUS] Now Playing"}
          </div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"12px", flexWrap:"wrap", gap:"10px" }}>
            <div>
              <div style={{ fontWeight:800, fontSize:"var(--text-lg)" }}>{playing.song}</div>
              <div style={{ color:"var(--text-secondary)", fontSize:"var(--text-sm)" }}>{playing.artist}</div>
            </div>
            <div style={{ display:"flex", gap:"8px" }}>
              <Button variant="outline" size="sm" icon={<IcChevronRight/>} onClick={skip}>{lang==="id"?"Skip":"Skip"}</Button>
              <Button variant="surface" size="sm" icon={<IcSquare size={12}/>}>{lang==="id"?"Stop":"Stop"}</Button>
            </div>
          </div>
          <ProgressBar value={pct} animated glow color="var(--accent-primary)" height={4}/>
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:"6px" }}>
            <span style={{ fontSize:"0.65rem", color:"var(--text-muted)", fontFamily:"var(--font-mono)" }}>1:22</span>
            <span style={{ fontSize:"0.65rem", color:"var(--text-muted)", fontFamily:"var(--font-mono)" }}>{playing.dur}</span>
          </div>
        </div>

        {/* Settings row */}
        <div style={{ display:"flex", gap:"12px", flexWrap:"wrap" }}>
          <div style={{ flex:1, background:"var(--bg-surface)", border:"1px solid var(--border-subtle)", borderRadius:"var(--r-lg)", padding:"14px 16px", display:"flex", flexDirection:"column", gap:"10px" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <span style={{ fontSize:"var(--text-sm)", fontWeight:600 }}>{lang==="id"?"Terima Request":"Accept Requests"}</span>
              <Toggle checked={allowReq} onChange={setAllowReq}/>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <span style={{ fontSize:"var(--text-sm)", fontWeight:600 }}>{lang==="id"?"Sub Only":"Sub Only"}</span>
              <Toggle checked={subOnly} onChange={setSubOnly}/>
            </div>
          </div>
          <div style={{ flex:1, background:"var(--bg-surface)", border:"1px solid var(--border-subtle)", borderRadius:"var(--r-lg)", padding:"14px 16px" }}>
            <FormField label={lang==="id"?`Max Antrean: ${maxQueue}`:`Max Queue: ${maxQueue}`}>
              <RangeSlider value={maxQueue} onChange={setMaxQueue} min={1} max={30} color="var(--accent-primary)" valueLabel={`${maxQueue}`}/>
            </FormField>
          </div>
        </div>

        {/* Add manually */}
        <div style={{ display:"flex", gap:"8px" }}>
          <Input value={newSong} onChange={setNewSong} placeholder={lang==="id"?"Tambah lagu manual (judul - artis)...":"Add song manually (title - artist)..."} icon={<IcPlus/>}/>
          <Button variant="primary" onClick={addSong}>{lang==="id"?"Tambah":"Add"}</Button>
        </div>

        {/* Queue list */}
        <Panel title={lang==="id"?`Antrean (${queue.length})`:`Queue (${queue.length})`} icon={<IcActivity size={13}/>}
          actions={<Button variant="ghost" size="xs" onClick={()=>setQueue([])}>{lang==="id"?"Hapus Semua":"Clear All"}</Button>}>
          {queue.length === 0 ? (
            <EmptyState icon={<IcVolume2/>} title={lang==="id"?"Antrean kosong":"Queue is empty"} description={lang==="id"?"Ketik !sr <judul lagu> di chat":"Type !sr <song title> in chat"}/>
          ) : (
            <div style={{ display:"flex", flexDirection:"column" }}>
              {queue.map((q, i) => (
                <div key={q.id} style={{ display:"flex", alignItems:"center", gap:"12px", padding:"10px 16px", borderBottom: i<queue.length-1?"1px solid var(--border-subtle)":"none" }}>
                  <span style={{ width:20, fontWeight:800, fontSize:"var(--text-sm)", color:"var(--text-muted)", textAlign:"center" }}>{i+1}</span>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontWeight:600, fontSize:"var(--text-sm)", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{q.song}</div>
                    <div style={{ fontSize:"var(--text-xs)", color:"var(--text-muted)" }}>{q.artist} • req: <span style={{ color:"var(--accent-primary)" }}>{q.req}</span></div>
                  </div>
                  <Tag color={q.platform==="spotify"?"green":"cyan"}>{q.platform}</Tag>
                  <span style={{ fontSize:"var(--text-xs)", fontFamily:"var(--font-mono)", color:"var(--text-muted)" }}>{q.dur}</span>
                  <div style={{ display:"flex", gap:"4px", alignItems:"center" }}>
                    <span style={{ fontSize:"var(--text-xs)", color:"#FFB800" }}>▲{q.votes}</span>
                    {i===0 && <Button variant="primary" size="xs" onClick={skip}>{lang==="id"?"Putar":"Play"}</Button>}
                    <IconButton icon={<IcX size={11}/>} size="sm" onClick={()=>setQueue(p=>p.filter(x=>x.id!==q.id))}/>
                  </div>
                </div>
              ))}
            </div>
          )}
        </Panel>
      </div>
    </div>
  );
}

                      <span style={{ color:goal.color, fontWeight:700 }}>{fmt(goal.current)}</span> / {fmt(goal.target)}

              <FormField label={lang==="id"?"Satuan":"Unit"}>
                <Input value={newGoal.unit} onChange={v=>setNewGoal(p=>({...p,unit:v}))} placeholder="followers, Rp, subs..."/>
              </FormField>
            </div>
            <FormField label={lang==="id"?"Ikon":"Icon"}>
              <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
                {["[TGT]","","","","⏰","[HOT]","[GAME]","[CHAT]"].map(e=>(

                ))}
              </div>
            </FormField>
          </div>
        </Modal>
      </div>
    </div>
  );
}

function MiniGamesPage() {
  const { lang, isLive, addToast, chatMessages } = useApp();
  const [activeGame, setActiveGame] = React.useState(null);
  const [wheelItems, setWheelItems] = React.useState(["StreamerX","anime_fan99","tech_wizard","luna_chan","pro_gamer_99","gifter_pro"]);
  const [spinning, setSpinning] = React.useState(false);
  const [winner, setWinner] = React.useState(null);
  const [wheelAngle, setWheelAngle] = React.useState(0);
  const [pollOptions, setPollOptions] = React.useState([{label:"Option A",votes:24},{label:"Option B",votes:31},{label:"Option C",votes:12}]);
  const [pollActive, setPollActive] = React.useState(false);
  const [pollTimer, setPollTimer] = React.useState(60);

  const spinWheel = () => {
    if (spinning || wheelItems.length === 0) return;
    setSpinning(true); setWinner(null);
    const spins = 5 + Math.random() * 5;
    const finalAngle = wheelAngle + spins * 360 + Math.random() * 360;
    setWheelAngle(finalAngle);
    setTimeout(() => {
      const idx = Math.floor(wheelItems.length - ((finalAngle % 360) / 360) * wheelItems.length) % wheelItems.length;
      const w = wheelItems[Math.max(0, idx)];
      setWinner(w); setSpinning(false);
      addToast(lang==="id"?`[YAY] Pemenang: ${w}!`:`[YAY] Winner: ${w}!`, "success");
    }, 3500);
  };

    { id:"wheel",   icon:"", label:lang==="id"?"Spin Wheel":"Spin Wheel",   desc:lang==="id"?"Putar roda untuk pilih pemenang":"Spin wheel to pick a winner" },
    { id:"poll",    icon:"[STAT]", label:lang==="id"?"Poll Chat":"Chat Poll",      desc:lang==="id"?"Buat voting real-time dari chat":"Create real-time chat voting" },
    { id:"trivia",  icon:"", label:"Trivia",                                  desc:lang==="id"?"Kuis trivia untuk penonton":"Trivia quiz for viewers" },
    { id:"lottery", icon:"", label:lang==="id"?"Lotere":"Lottery",           desc:lang==="id"?"Lotere dari semua penonton chat":"Lottery from all active chatters" },
  ];

  const colors = ["#00D4FF","#7C3AFF","#FFB800","#00FF88","#FF6B9D","#FF3C3C"];

  return (
    <div style={{ flex:1, overflow:"auto", padding:"24px", background:"var(--bg-base)" }}>
      <div style={{ maxWidth:"1000px", margin:"0 auto", display:"flex", flexDirection:"column", gap:"20px" }}>

          <h1 style={{ fontSize:"var(--text-2xl)", fontWeight:800, letterSpacing:"-0.02em" }}>[GAME] Mini Games</h1>

        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))", gap:"12px" }}>

              background: activeGame===g.id?"var(--accent-primary-glow)":"var(--bg-surface)",
              border:`2px solid ${activeGame===g.id?"var(--border-accent)":"var(--border-subtle)"}`,
              borderRadius:"var(--r-lg)", padding:"18px", cursor:"pointer",
              display:"flex", flexDirection:"column", gap:"8px", alignItems:"flex-start",
              transition:"all var(--t-fast)", textAlign:"left",
              boxShadow: activeGame===g.id?"var(--shadow-glow-cyan)":"none",
            }}>
              <span style={{ fontSize:"2rem" }}>{g.icon}</span>
              <div style={{ fontWeight:700, fontSize:"var(--text-sm)", color: activeGame===g.id?"var(--accent-primary)":"var(--text-primary)" }}>{g.label}</div>
              <div style={{ fontSize:"var(--text-xs)", color:"var(--text-muted)" }}>{g.desc}</div>
            </button>
          ))}
        </div>

        {/* SPIN WHEEL */}
        {activeGame === "wheel" && (
          <div style={{ background:"var(--bg-surface)", borderRadius:"var(--r-xl)", padding:"24px", border:"1px solid var(--border-subtle)", display:"flex", gap:"24px", flexWrap:"wrap" }}>

              <div style={{ position:"relative", width:"200px", height:"200px" }}>
                <svg viewBox="0 0 200 200" width="200" height="200" style={{ transform:`rotate(${wheelAngle}deg)`, transition: spinning?"transform 3.5s cubic-bezier(0.17,0.67,0.12,1)":"none" }}>
                  {wheelItems.map((item, i) => {
                    const slice = 360 / wheelItems.length;
                    const start = (i * slice) * Math.PI / 180;
                    const end = ((i + 1) * slice) * Math.PI / 180;
                    const x1 = 100 + 95 * Math.cos(start), y1 = 100 + 95 * Math.sin(start);
                    const x2 = 100 + 95 * Math.cos(end),   y2 = 100 + 95 * Math.sin(end);
                    const mx = 100 + 65 * Math.cos((start+end)/2), my = 100 + 65 * Math.sin((start+end)/2);
                    return (
                      <g key={i}>
                        <path d={`M100,100 L${x1},${y1} A95,95 0 0,1 ${x2},${y2} Z`} fill={colors[i%colors.length]} opacity="0.85" stroke="var(--bg-void)" strokeWidth="1.5"/>
                        <text x={mx} y={my} textAnchor="middle" dominantBaseline="middle" fill="white" fontSize="9" fontWeight="bold" fontFamily="sans-serif" transform={`rotate(${(i*slice+slice/2)},${mx},${my})`} style={{pointerEvents:"none"}}>
                          {item.length > 8 ? item.slice(0,7)+"…" : item}
                        </text>
                      </g>
                    );
                  })}
                  <circle cx="100" cy="100" r="12" fill="var(--bg-void)" stroke="white" strokeWidth="2"/>

                <div style={{ position:"absolute", top:"-8px", left:"50%", transform:"translateX(-50%)", width:0, height:0, borderLeft:"8px solid transparent", borderRight:"8px solid transparent", borderTop:"20px solid var(--accent-primary)", filter:"drop-shadow(0 0 6px rgba(0,212,255,0.6))" }}/>

                  <div style={{ fontSize:"var(--text-sm)", color:"var(--text-muted)" }}>{lang==="id"?"Pemenang!":"Winner!"}</div>
                </div>
              )}
            </div>
            {/* Participants */}
            <div style={{ flex:1, minWidth:"200px" }}>
              <SectionHeader label={lang==="id"?`Peserta (${wheelItems.length})`:`Participants (${wheelItems.length})`}
                action={<Button variant="ghost" size="xs" onClick={()=>setWheelItems([...new Set(chatMessages.map(m=>m.user))])}>{lang==="id"?"Import Chat":"Import Chat"}</Button>}/>
              <div style={{ display:"flex", flexDirection:"column", gap:"4px", maxHeight:"220px", overflow:"auto" }}>
                {wheelItems.map((item,i)=>(
                  <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 8px", background:`${colors[i%colors.length]}12`, borderRadius:"var(--r-sm)", border:`1px solid ${colors[i%colors.length]}25` }}>
                    <span style={{ fontSize:"var(--text-sm)", fontWeight:500 }}>{item}</span>
                    <IconButton icon={<IcX size={10}/>} size="sm" onClick={()=>setWheelItems(p=>p.filter((_,j)=>j!==i))}/>
                  </div>
                ))}
              </div>
              <div style={{ marginTop:"8px", display:"flex", gap:"6px" }}>
                <Input placeholder={lang==="id"?"Tambah peserta...":"Add participant..."} onKeyDown={e=>{ if(e.key==="Enter"&&e.target.value.trim()){setWheelItems(p=>[...p,e.target.value.trim()]);e.target.value="";}}}/>
              </div>
            </div>
          </div>
        )}

        {/* POLL */}
        {activeGame === "poll" && (
          <div style={{ background:"var(--bg-surface)", borderRadius:"var(--r-xl)", padding:"24px", border:"1px solid var(--border-subtle)" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"16px", flexWrap:"wrap", gap:"10px" }}>
              <h3 style={{ fontWeight:700 }}>{lang==="id"?"Poll Penonton":"Viewer Poll"}</h3>
              <div style={{ display:"flex", gap:"8px" }}>
                {pollActive?<Badge variant="live" size="sm"><StatusDot status="live" pulse size={5}/>&nbsp;Live</Badge>:<Badge variant="ghost" size="sm">Draft</Badge>}
                <Button variant={pollActive?"danger":"primary"} size="sm" onClick={()=>setPollActive(p=>!p)}>
                  {pollActive?(lang==="id"?"Akhiri Poll":"End Poll"):(lang==="id"?"Mulai Poll":"Start Poll")}
                </Button>
              </div>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:"10px" }}>
              {pollOptions.map((opt,i)=>{
                const pct = totalVotes>0 ? Math.round((opt.votes/totalVotes)*100) : 0;
                return (
                  <div key={i}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"4px" }}>
                      <span style={{ fontSize:"var(--text-sm)", fontWeight:600 }}>{opt.label}</span>
                      <span style={{ fontSize:"var(--text-sm)", color:colors[i], fontWeight:700 }}>{pct}% ({opt.votes})</span>
                    </div>
                    <ProgressBar value={pct} animated color={colors[i]} height={10} glow={pct===Math.max(...pollOptions.map(o=>o.votes>0?Math.round((o.votes/totalVotes)*100):0))}/>

            <div style={{ marginTop:"14px", fontSize:"var(--text-xs)", color:"var(--text-muted)" }}>
              {lang==="id"?`Total votes: ${totalVotes}`:`Total votes: ${totalVotes}`}
            </div>
          </div>
        )}

        {/* Placeholder for other games */}
        {(activeGame === "trivia" || activeGame === "lottery") && (
          <div style={{ background:"var(--bg-surface)", borderRadius:"var(--r-xl)", padding:"40px", textAlign:"center", border:"1px solid var(--border-subtle)" }}>
            <div style={{ fontSize:"3rem", marginBottom:"12px" }}>{games.find(g=>g.id===activeGame)?.icon}</div>
            <div style={{ fontWeight:700, fontSize:"var(--text-lg)", marginBottom:"8px" }}>{games.find(g=>g.id===activeGame)?.label}</div>
            <div style={{ color:"var(--text-muted)", fontSize:"var(--text-sm)" }}>{lang==="id"?"Segera hadir di versi berikutnya!":"Coming soon in the next version!"}</div>
          </div>
        )}
      </div>
    </div>
  );
}

function StreamDeckPage() {
  const { lang, isLive, setIsLive, isAFKMode, setIsAFKMode, isAIActive, setIsAIActive,
          isMicOn, setIsMicOn, isVoiceOn, setIsVoiceOn, addToast, setAvatarState } = useApp();

  const defaultButtons = [
    { id:1, label:lang==="id"?"Mulai Live":"Go Live",      icon:"[LIVE]", color:"#FF3C3C", action:"live",    col:1, row:1 },
    { id:2, label:"AFK Mode",                               icon:"[AFK]", color:"#7C3AFF", action:"afk",     col:2, row:1 },
    { id:3, label:"AI On/Off",                              icon:"[AI]", color:"#00D4FF", action:"ai",      col:3, row:1 },
    { id:4, label:"Mic",                                    icon:"[MIC2]", color:"#00FF88", action:"mic",     col:4, row:1 },
    { id:5, label:"TTS",                                    icon:"[VOL]", color:"#FFB800", action:"voice",   col:5, row:1 },
    { id:6, label:lang==="id"?"Sapa Chat":"Greet Chat",     icon:"", color:"#00D4FF", action:"greet",   col:1, row:2 },
    { id:7, label:"Excited",                                icon:"[HOT]", color:"#FFB800", action:"excited", col:2, row:2 },
    { id:8, label:"Sleepy",                                 icon:"", color:"#7C3AFF", action:"sleepy",  col:3, row:2 },
    { id:9, label:"Happy",                                  icon:"[SMILE]", color:"#00FF88", action:"happy",   col:4, row:2 },
    { id:10,label:"Scene: BRB",                             icon:"", color:"#FF6B9D", action:"brb",     col:5, row:2 },
    { id:11,label:"Clip!",                                  icon:"️", color:"#FF3C3C", action:"clip",    col:1, row:3 },
    { id:12,label:lang==="id"?"Refresh":"Refresh",          icon:"", color:"#8B96B0", action:"refresh", col:2, row:3 },
    { id:13,label:lang==="id"?"Screenshot":"Screenshot",    icon:"", color:"#8B96B0", action:"ss",      col:3, row:3 },
    { id:14,label:"Spin Wheel",                             icon:"", color:"#00D4FF", action:"wheel",   col:4, row:3 },
    { id:15,label:lang==="id"?"Kosong":"Empty",             icon:"", color:"#2A3040", action:"empty",   col:5, row:3 },
  ];

  const [buttons, setButtons] = React.useState(defaultButtons);
  const [pressed, setPressed] = React.useState(null);
  const [editMode, setEditMode] = React.useState(false);

  const handlePress = (btn) => {
    if (editMode) return;
    setPressed(btn.id);
    setTimeout(() => setPressed(null), 300);
    const greetings = ["Halo semuanya!", "Apa kabar gaes?", "Selamat datang di stream!"];
    switch (btn.action) {
      case "live":    setIsLive(p=>!p); addToast(lang==="id"?"Stream toggled!":"Stream toggled!", isLive?"default":"success"); break;
      case "afk":     setIsAFKMode(p=>!p); addToast(isAFKMode?`AFK Off`:`AFK On`,"info"); break;
      case "ai":      setIsAIActive(p=>!p); addToast(isAIActive?"AI Off":"AI On","info"); break;
      case "mic":     setIsMicOn(p=>!p); break;
      case "voice":   setIsVoiceOn(p=>!p); break;
      case "greet":   if(window.speechSynthesis){const u=new SpeechSynthesisUtterance(greetings[Math.floor(Math.random()*greetings.length)]);u.lang="id-ID";window.speechSynthesis.speak(u);} break;
      case "excited": setAvatarState("excited"); addToast(" Excited!","success"); break;
      case "sleepy":  setAvatarState("sleepy");  addToast(" Sleepy!","default"); break;
      case "happy":   setAvatarState("happy");   addToast("[SMILE] Happy!","success"); break;
      case "clip":    addToast(lang==="id"?"Clip tersimpan!":"Clip saved!","success"); break;
      case "refresh": window.location.reload(); break;
      default: addToast(`${btn.label}!`,"default");
    }
  };

  const getActiveState = (action) => {
    if (action==="live")  return isLive;
    if (action==="afk")   return isAFKMode;
    if (action==="ai")    return isAIActive;
    if (action==="mic")   return isMicOn;
    if (action==="voice") return isVoiceOn;
    return false;
  };

  return (
    <div style={{ flex:1, overflow:"auto", padding:"24px", background:"var(--bg-base)" }}>
      <div style={{ maxWidth:"720px", margin:"0 auto", display:"flex", flexDirection:"column", gap:"20px" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", flexWrap:"wrap", gap:"12px" }}>
          <div>
            <h1 style={{ fontSize:"var(--text-2xl)", fontWeight:800, letterSpacing:"-0.02em" }}>⌨️ Stream Deck</h1>
            <p style={{ color:"var(--text-secondary)", fontSize:"var(--text-sm)", marginTop:"4px" }}>{lang==="id"?"Panel kontrol shortcut untuk aksi cepat":"Shortcut control panel for quick actions"}</p>
          </div>
          <Button variant={editMode?"primary":"surface"} size="sm" icon={<IcSettings/>} onClick={()=>setEditMode(p=>!p)}>
            {editMode?(lang==="id"?"Selesai Edit":"Done Editing"):(lang==="id"?"Edit Layout":"Edit Layout")}
          </Button>
        </div>

        {/* Deck grid */}
        <div style={{
          background:"var(--bg-void)", borderRadius:"var(--r-xl)", padding:"20px",
          border:"1px solid var(--border-subtle)",
          boxShadow:"inset 0 2px 20px rgba(0,0,0,0.4)",
        }}>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:"10px" }}>
            {buttons.map(btn => {
              const isActive = getActiveState(btn.action);
              const isPressed = pressed === btn.id;
              return (
                <button key={btn.id}
                  onClick={() => handlePress(btn)}
                  style={{
                    aspectRatio:"1",
                    background: isActive ? `${btn.color}22` : "rgba(255,255,255,0.04)",
                    border:`1.5px solid ${isActive?btn.color:isPressed?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.08)"}`,
                    borderRadius:"var(--r-lg)", cursor: btn.action==="empty"?"default":"pointer",
                    display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:"5px",
                    transition:"all 0.1s ease",
                    transform: isPressed?"scale(0.93)":"scale(1)",
                    boxShadow: isActive?`0 0 16px ${btn.color}40,inset 0 0 12px ${btn.color}10`:"inset 0 1px 0 rgba(255,255,255,0.06)",
                    outline:"none",
                    position:"relative",
                    overflow:"hidden",
                  }}
                >
                  {isActive && <div style={{ position:"absolute", top:0, left:0, right:0, height:"2px", background:btn.color, opacity:0.8 }}/>}
                  <span style={{ fontSize:"1.4rem", lineHeight:1 }}>{btn.icon}</span>
                  <span style={{
                    fontSize:"0.55rem", fontWeight:700, textAlign:"center", lineHeight:1.2,
                    color: isActive?btn.color:"rgba(255,255,255,0.5)",
                    textTransform:"uppercase", letterSpacing:"0.06em",
                    padding:"0 4px",
                  }}>
                    {btn.label}
                  </span>
                  {isActive && <div style={{ position:"absolute", bottom:"4px", width:"4px", height:"4px", borderRadius:"50%", background:btn.color }}/>}
                  {editMode && btn.action!=="empty" && (
                    <div style={{ position:"absolute", top:2, right:2 }}>
                      <span style={{ fontSize:"0.5rem", background:"rgba(0,0,0,0.6)", borderRadius:"3px", padding:"1px 3px", color:"rgba(255,255,255,0.5)" }}>⋮⋮</span>
                    </div>
                  )}
                </button>
              );
            })}
          </div>
        </div>

        {/* Status row */}
        <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", justifyContent:"center" }}>
          {[
            { label:"LIVE",  active:isLive,      color:"#FF3C3C" },
            { label:"AFK",   active:isAFKMode,   color:"#7C3AFF" },
            { label:"AI",    active:isAIActive,   color:"#00D4FF" },
            { label:"MIC",   active:isMicOn,      color:"#00FF88" },
            { label:"TTS",   active:isVoiceOn,    color:"#FFB800" },
          ].map(s=>(
            <div key={s.label} style={{ display:"flex", alignItems:"center", gap:"5px", padding:"4px 10px", borderRadius:"var(--r-full)", background:s.active?`${s.color}15`:"var(--bg-elevated)", border:`1px solid ${s.active?s.color:"var(--border-subtle)"}` }}>
              <StatusDot status={s.active?"online":"offline"} size={6} pulse={s.active}/>
              <span style={{ fontSize:"0.65rem", fontWeight:700, color:s.active?s.color:"var(--text-muted)", letterSpacing:"0.08em" }}>{s.label}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

      </div>
    </div>

}

/* ══════════════════════════════════════════════════════════
   PERFORMER PAGE
   Clean fullscreen holographic display — zero UI chrome
   Avatar + Script TTS + Comment bubbles + AI response
   Untuk OBS / TikTok Live Studio Browser Source
   ══════════════════════════════════════════════════════════ */
function PerformerPage() {
  const { lang, setCurrentPage, avatarState, setAvatarState, isAFKMode } = useApp();
  const { speaking, mouthOpen, speak, stop } = useSpeech();
  const [bg, setBg] = React.useState("hologram");
  const [avatarMode, setAvatarMode] = React.useState("svg"); // svg | webcam | hybrid
  const [avatarStyle, setAvatarStyle] = React.useState("realistic"); // cartoon | realistic | 3d
  const [webcamFilter, setWebcamFilter] = React.useState("anime");
  const [scriptText, setScriptText] = React.useState("");
  const [comments, setComments] = React.useState([]);
  const [showPanel, setShowPanel] = React.useState(false);
  const [showComments, setShowComments] = React.useState(true);
  const [isThinking, setIsThinking] = React.useState(false);
  const [webcamActive, setWebcamActive] = React.useState(false);
  const [webcamError, setWebcamError] = React.useState(null);
  const videoRef = React.useRef(null);
  const streamRef = React.useRef(null);
  const panelTimerRef = React.useRef(null);

  /* ── Webcam start/stop ── */
  const startWebcam = React.useCallback(async () => {
    setWebcamError(null);
    try {
      const s = await navigator.mediaDevices.getUserMedia({ video: { width:1280, height:720, facingMode:"user" } });
      streamRef.current = s;
      if (videoRef.current) { videoRef.current.srcObject = s; videoRef.current.play(); }
      setWebcamActive(true);
    } catch(e) {
      setWebcamError(lang==="id" ? "Izin kamera ditolak." : "Camera permission denied.");
      setAvatarMode("svg");
    }
  }, [lang]);

  const stopWebcam = React.useCallback(() => {
    if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
    if (videoRef.current) videoRef.current.srcObject = null;
    setWebcamActive(false);
  }, []);

  React.useEffect(() => {
    if (avatarMode === "webcam" || avatarMode === "hybrid") { startWebcam(); }
    else { stopWebcam(); }
  }, [avatarMode]);

  React.useEffect(() => () => stopWebcam(), []);

  /* ── Auto-hide panel after 4s of inactivity ── */
  const wakePanel = React.useCallback(() => {
    setShowPanel(true);
    clearTimeout(panelTimerRef.current);
    panelTimerRef.current = setTimeout(() => setShowPanel(false), 4000);
  }, []);

  React.useEffect(() => {
    document.addEventListener("mousemove", wakePanel);
    document.addEventListener("keydown", wakePanel);
    wakePanel();
    return () => {
      document.removeEventListener("mousemove", wakePanel);
      document.removeEventListener("keydown", wakePanel);
      clearTimeout(panelTimerRef.current);
    };
  }, [wakePanel]);

  /* ── TTS read ── */
  const readScript = React.useCallback((text) => {
    if (!text.trim()) return;
    // Send to 3D iframe if in 3D mode
    if (avatarStyle === "3d") {
      const iframe = document.getElementById("ac-3d-iframe");
      iframe?.contentWindow?.postMessage({ type:"READ_SCRIPT", data:{ text } }, "*");
      return;
    }
    stop();
    setAvatarState("talking");
    speak(text, () => setAvatarState("idle"));
  }, [speak, stop, setAvatarState, avatarStyle]);

  /* ── Add floating comment ── */
  const addComment = React.useCallback((user, text, color) => {
    const id = Date.now() + Math.random();
    const c = { id, user, text, color, ts: Date.now() };
    setComments(prev => [...prev.slice(-15), c]);
    setTimeout(() => setComments(prev => prev.filter(x => x.id !== id)), 8000);
    if (text.endsWith("?") || text.toLowerCase().includes("kak") || text.toLowerCase().includes("bang")) {
      setTimeout(() => readScript(lang === "id"
        ? `Halo ${user}, makasih udah chat!`
        : `Hey ${user}, thanks for chatting!`
      ), 600);
    }
  }, [lang, readScript]);

  /* ── Demo comments on mount ── */
  React.useEffect(() => {
    const demos = [
      { user:"viewer99",    color:"#00D4FF", text:lang==="id"?"Halo kak, cantik banget avatarnya!":"Hey, love the avatar!" },
      { user:"fan_xyz",     color:"#7C3AFF", text:lang==="id"?"Ini pakai AI ya?":"Is this AI powered?" },
      { user:"streamer01",  color:"#00FF88", text:lang==="id"?"Keren banget teknologinya!":"The tech is amazing!" },
    ];
    let t = 1000;
    demos.forEach(d => { setTimeout(() => addComment(d.user, d.text, d.color), t); t += 2500; });
  }, []);

  /* ── Particles ── */
  const particles = React.useMemo(() =>
    Array.from({length:22},(_,i) => ({
      id:i, x:5+Math.random()*90, delay:Math.random()*9,

  /* ── Backgrounds ── */

                    color: webcamFilter===f.v ? "#7C3AFF" : "rgba(255,255,255,0.3)",

            <div style={{width:1,height:22,background:"rgba(255,255,255,0.08)"}}/>

            {/* BG selector */}
            <div style={{ display:"flex", gap:3, alignItems:"center", flexWrap:"wrap" }}>
              <span style={{fontSize:"0.62rem",color:"rgba(255,255,255,0.3)",letterSpacing:"0.08em",marginRight:2}}>BG</span>
              {[
                {v:"hologram",      l:"Hologram",  c:"#00D4FF"},
                {v:"dark",          l:"Dark",       c:"#555"},
                {v:"transparent",   l:"Clear",      c:"rgba(255,255,255,0.5)"},
                {v:"green",         l:"Chroma",     c:"#00B140"},
                {v:"room_affiliate",l:"[HOME] Kamar",   c:"#C8A882"},
                {v:"room_studio",   l:"[STD] Studio",  c:"#7C3AFF"},

                <button key={b.v} onClick={()=>setBg(b.v)} style={{
                  padding:"4px 9px", borderRadius:999, cursor:"pointer",

            <div style={{width:1,height:22,background:"rgba(255,255,255,0.08)"}}/>

            {/* Emotion picks */}

              <button key={em.id} onClick={() => setAvatarState(em.id)} style={{
                width:30, height:30, borderRadius:"50%", cursor:"pointer",
                background: avatarState===em.id ? "rgba(0,212,255,0.18)" : "transparent",
                border:`1px solid ${avatarState===em.id ? "rgba(0,212,255,0.45)" : "rgba(255,255,255,0.1)"}`,
                fontSize:"0.95rem", display:"flex", alignItems:"center", justifyContent:"center",
                transition:"all 0.15s", outline:"none",
              }}>{em.e}</button>
            ))}

            <div style={{width:1,height:22,background:"rgba(255,255,255,0.08)"}}/>

            {/* Comment test input */}
            <input
              placeholder={lang==="id"?"[CHAT] Test komentar (Enter kirim)...":"[CHAT] Test comment (Enter send)..."}
              style={{
                width:200, background:"rgba(255,255,255,0.04)",
                border:"1px solid rgba(255,255,255,0.1)", borderRadius:999,
                padding:"5px 12px", color:"#F0F4FF", fontSize:"0.72rem",
                fontFamily:"var(--font-display)", outline:"none",
              }}
              onKeyDown={e => {
                if(e.key==="Enter" && e.target.value.trim()) {
                  e.preventDefault();
                  const palette=["#00D4FF","#7C3AFF","#00FF88","#FFB800","#FF6B9D"];
                  addComment("viewer", e.target.value, palette[Math.floor(Math.random()*palette.length)]);
                  e.target.value = "";
                }
                e.stopPropagation();
              }}
            />
            <button onClick={() => setShowComments(p=>!p)} style={{
              padding:"5px 12px", borderRadius:999, cursor:"pointer",
              background: showComments ? "rgba(0,212,255,0.12)" : "transparent",
              border:`1px solid ${showComments ? "rgba(0,212,255,0.35)" : "rgba(255,255,255,0.1)"}`,
              color: showComments ? "#00D4FF" : "rgba(255,255,255,0.35)",
              fontSize:"0.68rem", fontWeight:700, fontFamily:"var(--font-display)",
            }}>[CHAT] {showComments?"ON":"OFF"}</button>

            <div style={{flex:1}}/>

            {/* Back to Studio */}
            <button onClick={() => setCurrentPage("studio")} style={{
              padding:"6px 14px", borderRadius:999, cursor:"pointer",
              background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.12)",
              color:"rgba(255,255,255,0.45)", fontSize:"0.7rem", fontWeight:700,
              fontFamily:"var(--font-display)", transition:"all 0.15s",
            }}>← {lang==="id"?"Kembali":"Back"}</button>
          </div>
        </div>

        {/* Info bar */}
        <div style={{
          background:"rgba(0,212,255,0.04)", borderTop:"1px solid rgba(0,212,255,0.08)",
          padding:"5px 20px", display:"flex", gap:16, alignItems:"center",
        }}>
          <span style={{fontSize:"0.6rem",color:"rgba(0,212,255,0.4)",letterSpacing:"0.12em",fontFamily:"var(--font-mono)"}}>
            ALTERCAST PERFORMER
          </span>
          <span style={{fontSize:"0.6rem",color:"rgba(255,255,255,0.2)",fontFamily:"var(--font-mono)"}}>
            {lang==="id"
              ? "• Tambahkan URL ini ke Browser Source di TikTok Live Studio / OBS"
              : "• Add this URL as Browser Source in TikTok Live Studio / OBS"}
          </span>
          <div style={{flex:1}}/>
          <span style={{fontSize:"0.6rem",color:"rgba(255,255,255,0.2)",fontFamily:"var(--font-mono)"}}>
            {lang==="id"?"gerakkan mouse untuk tampilkan kontrol":"move mouse to show controls"}
          </span>
        </div>
      </div>

      {/* Watermark */}
      <div style={{
        position:"absolute", bottom:18, left:20, zIndex:5,
        fontSize:"0.55rem", color:"rgba(0,212,255,0.18)",
        fontFamily:"var(--font-mono)", letterSpacing:"0.12em",
        pointerEvents:"none",
        opacity: showPanel ? 0 : 0.6, transition:"opacity 0.4s",
      }}>
        ALTERCAST [*] PERFORMER
      </div>
    </div>
  );
}

</script>

<script type="text/babel" data-presets="react">
// ⑧ MAIN APP
/* ─────────────────────────────────────────────
   AlterCast — EXPORT ALL PAGES
   ───────────────────────────────────────────── */

   STUDIO PAGE — 3-COLUMN LAYOUT
   Sidebar | AvatarCanvas | ChatPanel
   ══════════════════════════════ */

    <div style={{
      flex: 1,
      display: "flex",
      flexDirection: "row",
      overflow: "hidden",
      background: "var(--bg-void)",

      <Sidebar />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", position: "relative" }}>
        <AvatarCanvas />
      </div>
      <ChatPanel />

  );
}

Object.assign(window, {
  StudioPage,
  AvatarPage, DashboardPage, SettingsPage, OverlayPage, LandingPage, SettingsSection,
  AutonomousPage, AlertsPage, VoiceLabPage, ScenePage, ProfilesPage,
  AnalyticsProPage, ChatToolsPage, SchedulePage, IntegrationsPage,
  ClipsPage, SongQueuePage, GoalsPage, MiniGamesPage, StreamDeckPage, EmotesPage
});

/* ─────────────────────────────────────────────
   AlterCast — Main App v1.0
   Root component, state management, routing
   ───────────────────────────────────────────── */

function App() {
  /* ── GLOBAL STATE ── */
  const [lang,          setLang]          = React.useState("id");
  const [theme,         setTheme]         = React.useState("dark");
  const [currentPage,   setCurrentPage]   = React.useState("landing");

  /* Stream state */
  const [isLive,        setIsLive]        = React.useState(false);
  const [isAFKMode,     setIsAFKMode]     = React.useState(false);
  const [isOBSConnected,setIsOBSConnected]= React.useState(false);

  /* Controls */
  const [isMicOn,       setIsMicOn]       = React.useState(false);
  const [isVoiceOn,     setIsVoiceOn]     = React.useState(true);
  const [isCameraOn,    setIsCameraOn]    = React.useState(false);
  const [isAIActive,    setIsAIActive]    = React.useState(true);

  /* Avatar */
  const [avatarState,   setAvatarState]   = React.useState("idle");

  /* Chat */
  const [chatMessages,  setChatMessages]  = React.useState(MOCK_CHAT);

  /* Volume */
  const [volume,        setVolume]        = React.useState(80);

  /* Toasts */
  const [toasts,        setToasts]        = React.useState([]);

  /* Tweaks panel */
  const [tweaksOpen,    setTweaksOpen]    = React.useState(false);

  /* ── TWEAKS DEFAULTS ── */
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accentColor": "#00D4FF",
    "theme": "light",
    "language": "en",
    "avatarGlow": true,
    "showParticles": true,
    "sidebarWidth": 220,
    "chatWidth": 300,
    "fontSize": 14
  }/*EDITMODE-END*/;

  /* ── THEME EFFECT ── */
  React.useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
  }, [theme]);

  /* ── TOAST HELPERS ── */
  const addToast = React.useCallback((message, type = "default") => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  }, []);

  const dismissToast = React.useCallback((id) => {
    setToasts(prev => prev.filter(t => t.id !== id));
  }, []);

  /* ── TWEAKS PANEL PROTOCOL ── */
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === "__activate_edit_mode")   setTweaksOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  /* ── KEYBOARD SHORTCUTS ── */
  React.useEffect(() => {
    const handler = (e) => {
      const tag = e.target?.tagName;
      if (tag === "INPUT" || tag === "TEXTAREA") return;
      if (e.key === "F" && !e.ctrlKey && !e.metaKey) {
        document.documentElement.requestFullscreen?.();
      }
      if (e.key === "1") setCurrentPage("studio");
      if (e.key === "2") setCurrentPage("avatar");
      if (e.key === "3") setCurrentPage("dashboard");
      if (e.key === "4") setCurrentPage("settings");
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);

  /* ── AFK AUTO-SIMULATE ── */
  React.useEffect(() => {
    if (!isAFKMode || !isLive) return;
    const states = ["idle", "talking", "happy", "excited", "reading"];
    let i = 0;
    const iv = setInterval(() => {
      setAvatarState(states[i % states.length]);
      i++;
    }, 5000);
    return () => clearInterval(iv);
  }, [isAFKMode, isLive]);

  /* ── CONTEXT VALUE ── */
  const ctxValue = {
    lang, setLang,
    theme, setTheme,
    tweaksOpen, setTweaksOpen,
    currentPage, setCurrentPage,
    isLive, setIsLive,
    isAFKMode, setIsAFKMode,
    isOBSConnected, setIsOBSConnected,
    isMicOn, setIsMicOn,
    isVoiceOn, setIsVoiceOn,
    isCameraOn, setIsCameraOn,
    isAIActive, setIsAIActive,
    avatarState, setAvatarState,
    chatMessages, setChatMessages,
    volume, setVolume,
    addToast,
  };

  const S = STRINGS[lang];
  const isStudioPage = currentPage !== "landing" && currentPage !== "performer";

  return (
    <AppContext.Provider value={ctxValue}>
      {/* Main app shell */}
      <div style={{
        height: "100vh", display: "flex", flexDirection: "column",
        background: "var(--bg-base)", color: "var(--text-primary)",
        fontFamily: "var(--font-display)", overflow: "hidden",
      }}>
        {/* Navbar (all pages except landing) */}
        {isStudioPage && <Navbar />}

        {/* Page content */}
        <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
          {currentPage === "landing"   && <LandingPage />}
          {currentPage === "studio"    && <StudioPage />}
          {currentPage === "avatar"    && <AvatarPage />}
          {currentPage === "dashboard"  && <DashboardPage />}
          {currentPage === "settings"   && <SettingsPage />}
          {currentPage === "performer"    && <PerformerPage />}
          {currentPage === "autonomous" && <AutonomousPage />}
          {currentPage === "overlay"    && <OverlayPage />}
          {currentPage === "alerts"     && <AlertsPage />}
          {currentPage === "voicelab"   && <VoiceLabPage />}
          {currentPage === "scene"      && <ScenePage />}
          {currentPage === "profiles"   && <ProfilesPage />}
          {currentPage === "analytics"  && <AnalyticsProPage />}
          {currentPage === "chattools"    && <ChatToolsPage />}
          {currentPage === "schedule"     && <SchedulePage />}
          {currentPage === "integrations" && <IntegrationsPage />}
          {currentPage === "clips"        && <ClipsPage />}
          {currentPage === "songqueue"    && <SongQueuePage />}
          {currentPage === "goals"        && <GoalsPage />}
          {currentPage === "minigames"    && <MiniGamesPage />}
          {currentPage === "streamdeck"   && <StreamDeckPage />}
          {currentPage === "emotes"       && <EmotesPage />}
        </div>

        {currentPage === "studio" && <BottomBar />}

        {/* Toast notifications */}
        <ToastContainer toasts={toasts} onDismiss={dismissToast} />

        {/* Tweaks Panel */}
        {tweaksOpen && <AlterCastTweaks onClose={() => {
          setTweaksOpen(false);
          window.parent.postMessage({ type: "__edit_mode_dismissed" }, "*");
        }} />}
      </div>
    </AppContext.Provider>
  );
}

/* ══ TWEAKS PANEL FOR ALTERCAST ══ */
function AlterCastTweaks({ onClose }) {
  const { lang, setLang, theme, setTheme, setCurrentPage, currentPage,
          isLive, setIsLive, isAFKMode, setIsAFKMode, addToast,
          avatarState, setAvatarState } = useApp();
  const S = STRINGS[lang];

  const [t, setT] = React.useState({
    accentColor: "#00D4FF",
    theme: theme,
    language: lang,
    avatarGlow: true,
    showParticles: true,
    sidebarWidth: 220,
    chatWidth: 300,
    fontSize: 14,
  });

  const setTweak = (key, val) => {
    const next = typeof key === "object" ? { ...t, ...key } : { ...t, [key]: val };
    setT(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: next }, "*");
    if (key === "theme" || (typeof key === "object" && key.theme)) setTheme(val || key.theme);
    if (key === "language" || (typeof key === "object" && key.language)) setLang(val || key.language);
  };

  return (
    <div style={{
      position: "fixed", bottom: "80px", right: "16px",
      width: "260px",
      background: "var(--bg-elevated)",
      border: "1px solid var(--border-normal)",
      borderRadius: "var(--r-xl)",
      boxShadow: "var(--shadow-lg), var(--shadow-glow-cyan)",
      zIndex: "var(--z-modal)",
      overflow: "hidden",
      animation: "bounce-in 0.3s ease",
    }}>
      {/* Header */}
      <div style={{
        padding: "12px 16px", borderBottom: "1px solid var(--border-subtle)",
        display: "flex", justifyContent: "space-between", alignItems: "center",
        background: "linear-gradient(135deg, rgba(0,212,255,0.06), rgba(124,58,255,0.04))",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: "7px" }}>
          <AlterCastLogo size={18} showText={false} />
          <span style={{ fontWeight: 700, fontSize: "var(--text-sm)" }}>Tweaks</span>
        </div>
        <IconButton icon={<IcX />} onClick={onClose} size="sm" />
      </div>

      <div style={{ padding: "12px 16px", display: "flex", flexDirection: "column", gap: "14px", maxHeight: "480px", overflow: "auto" }}>

        {/* Page Navigation */}
        <div>
          <div style={{ fontSize: "0.65rem", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", color: "var(--text-muted)", marginBottom: "6px" }}>Page</div>
          <Select
            value={currentPage}
            onChange={setCurrentPage}
            options={[
              { value: "landing",   label: STRINGS[lang].nav_landing },
              { value: "studio",       label: STRINGS[lang].nav_studio },
              { value: "avatar",       label: STRINGS[lang].nav_avatar },
              { value: "dashboard",    label: STRINGS[lang].nav_dashboard },
              { value: "autonomous",   label: lang==="id"?"Otonom":"Autonomous" },
              { value: "alerts",       label: "Alert Center" },
              { value: "voicelab",     label: "Voice Lab" },
              { value: "scene",        label: "Scene Manager" },
              { value: "profiles",     label: lang==="id"?"Profil":"Profiles" },
              { value: "chattools",    label: "Chat Tools" },
              { value: "analytics",    label: lang==="id"?"Analitik Pro":"Analytics Pro" },
              { value: "schedule",     label: lang==="id"?"Jadwal":"Schedule" },
              { value: "integrations", label: lang==="id"?"Integrasi":"Integrations" },
              { value: "clips",        label: "Clip Studio" },
              { value: "songqueue",    label: "Song Queue" },
              { value: "goals",        label: "Goals" },
              { value: "minigames",    label: "Mini Games" },
              { value: "streamdeck",   label: "Stream Deck" },
              { value: "emotes",       label: lang==="id"?"Emote & Badge":"Emotes & Badges" },
              { value: "settings",     label: STRINGS[lang].nav_settings },
              { value: "overlay",      label: STRINGS[lang].nav_overlay },
            ]}
          />
        </div>

        {/* Language */}
        <div>
          <div style={{ fontSize: "0.65rem", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", color: "var(--text-muted)", marginBottom: "6px" }}>Language</div>
          <div style={{ display: "flex", gap: "6px" }}>
            {[{v:"id",l:" ID"},{v:"en",l:" EN"}].map(({v,l}) => (
              <button key={v}
                onClick={() => { setTweak("language", v); setLang(v); }}
                style={{
                  flex: 1, padding: "6px", borderRadius: "var(--r-sm)",
                  background: lang === v ? "var(--accent-primary-glow)" : "var(--bg-overlay)",
                  border: `1px solid ${lang === v ? "var(--border-accent)" : "var(--border-subtle)"}`,
                  color: lang === v ? "var(--accent-primary)" : "var(--text-secondary)",
                  fontSize: "var(--text-xs)", fontWeight: 700,
                  cursor: "pointer", transition: "all var(--t-fast)",
                }}>
                {l}
              </button>
            ))}
          </div>
        </div>

        {/* Theme */}
        <div>
          <div style={{ fontSize: "0.65rem", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", color: "var(--text-muted)", marginBottom: "6px" }}>Theme</div>
          <div style={{ display: "flex", gap: "6px" }}>
            {[{v:"dark",icon:<IcMoon size={13}/>},{v:"light",icon:<IcSun size={13}/>}].map(({v,icon}) => (
              <button key={v}
                onClick={() => { setTweak("theme", v); setTheme(v); }}
                style={{
                  flex: 1, padding: "7px", borderRadius: "var(--r-sm)",
                  background: theme === v ? "var(--accent-primary-glow)" : "var(--bg-overlay)",
                  border: `1px solid ${theme === v ? "var(--border-accent)" : "var(--border-subtle)"}`,
                  color: theme === v ? "var(--accent-primary)" : "var(--text-secondary)",
                  fontSize: "var(--text-xs)", fontWeight: 600,
                  cursor: "pointer", transition: "all var(--t-fast)",
                  display: "flex", alignItems: "center", gap: "4px", justifyContent: "center",
                }}>
                {icon}
                {v.charAt(0).toUpperCase() + v.slice(1)}
              </button>
            ))}
          </div>
        </div>

        {/* Avatar state */}
        <div>
          <div style={{ fontSize: "0.65rem", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", color: "var(--text-muted)", marginBottom: "6px" }}>Avatar Emotion</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "4px" }}>
            {Object.entries(EMOTION_CONFIG).map(([id, cfg]) => (
              <button key={id}
                onClick={() => setAvatarState(id)}
                title={cfg.label[lang === "id" ? "id" : "en"]}
                style={{
                  padding: "6px 4px", borderRadius: "var(--r-sm)",
                  background: avatarState === id ? `${cfg.color}22` : "var(--bg-overlay)",
                  border: `1px solid ${avatarState === id ? `${cfg.color}44` : "var(--border-subtle)"}`,
                  cursor: "pointer", fontSize: "1rem", transition: "all var(--t-fast)",
                }}>
                {cfg.emoji}
              </button>
            ))}
          </div>
        </div>

        {/* Stream toggles */}
        <div>
          <div style={{ fontSize: "0.65rem", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", color: "var(--text-muted)", marginBottom: "8px" }}>Stream Controls</div>
          <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: "var(--text-xs)", color: "var(--text-secondary)" }}>
                {isLive ? "[LIVE] " + S.status_live : "[OFF] " + S.status_offline}
              </span>
              <Toggle checked={isLive} onChange={(v) => { setIsLive(v); addToast(v ? S.toast_live : S.toast_stopped, v ? "success" : "default"); }} size="sm" />
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: "var(--text-xs)", color: "var(--text-secondary)" }}>[AFK] AFK Mode</span>
              <Toggle checked={isAFKMode} onChange={(v) => { setIsAFKMode(v); addToast(v ? S.toast_afk_on : S.toast_afk_off, "info"); }} size="sm" />
            </div>
          </div>
        </div>

        {/* Font size */}
        <div>
          <div style={{ fontSize: "0.65rem", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", color: "var(--text-muted)", marginBottom: "6px" }}>Font Size: {t.fontSize}px</div>
          <RangeSlider value={t.fontSize} onChange={v => { setTweak("fontSize", v); document.documentElement.style.fontSize = v + "px"; }} min={12} max={18} color="var(--accent-primary)" />
        </div>

      </div>

      {/* Footer */}
      <div style={{ padding: "10px 16px", borderTop: "1px solid var(--border-subtle)", display: "flex", gap: "6px" }}>
        <Button variant="primary" size="sm" fullWidth onClick={() => addToast(S.toast_saved, "success")}>
          {S.save}
        </Button>
      </div>
    </div>
  );
}

/* ── RENDER ── */
const rootEl = document.getElementById("root");
const root = ReactDOM.createRoot(rootEl);
root.render(<App />);

</script>

</body>
</html>
