@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── DARK THEME (default) ── */
:root {
  /* BACKGROUNDS */
  --bg-void:          #080A0F;
  --bg-base:          #0D0F17;
  --bg-surface:       #131720;
  --bg-elevated:      #1A2030;
  --bg-overlay:       #212840;
  --bg-hover:         rgba(255,255,255,0.04);
  --bg-active:        rgba(0,212,255,0.08);

  /* ACCENT PRIMARY — ELECTRIC CYAN */
  --accent-primary:         #00D4FF;
  --accent-primary-dim:     #0099BB;
  --accent-primary-glow:    rgba(0, 212, 255, 0.15);
  --accent-primary-glow-lg: rgba(0, 212, 255, 0.25);
  --accent-primary-rgb:     0, 212, 255;

  /* ACCENT SECONDARY — VIOLET */
  --accent-secondary:       #7C3AFF;
  --accent-secondary-dim:   #5A2ACC;
  --accent-secondary-glow:  rgba(124, 58, 255, 0.15);
  --accent-secondary-rgb:   124, 58, 255;

  /* STATUS */
  --status-live:        #FF3C3C;
  --status-live-glow:   rgba(255, 60, 60, 0.3);
  --status-online:      #00FF88;
  --status-warning:     #FFB800;
  --status-offline:     #4A5568;
  --status-info:        #00D4FF;

  /* TEXT */
  --text-primary:   #F0F4FF;
  --text-secondary: #8B96B0;
  --text-muted:     #4A5568;
  --text-disabled:  #2D3748;
  --text-accent:    #00D4FF;
  --text-inverse:   #080A0F;

  /* BORDERS */
  --border-subtle:  rgba(255,255,255,0.06);
  --border-normal:  rgba(255,255,255,0.12);
  --border-strong:  rgba(255,255,255,0.20);
  --border-accent:  rgba(0,212,255,0.3);
  --border-focus:   rgba(0,212,255,0.6);
  --border-violet:  rgba(124,58,255,0.3);
  --border-live:    rgba(255,60,60,0.4);

  /* SHADOWS */
  --shadow-xs:         0 1px 4px rgba(0,0,0,0.3);
  --shadow-sm:         0 2px 8px rgba(0,0,0,0.4);
  --shadow-md:         0 4px 24px rgba(0,0,0,0.6);
  --shadow-lg:         0 8px 48px rgba(0,0,0,0.7);
  --shadow-glow-cyan:  0 0 20px rgba(0,212,255,0.2), 0 0 60px rgba(0,212,255,0.08);
  --shadow-glow-cyan-lg: 0 0 40px rgba(0,212,255,0.3), 0 0 80px rgba(0,212,255,0.15);
  --shadow-glow-violet: 0 0 30px rgba(124,58,255,0.2);
  --shadow-glow-live:  0 0 20px rgba(255,60,60,0.3);
  --border-glow: 0 0 0 1px rgba(0,212,255,0.4), 0 0 20px rgba(0,212,255,0.1);

  /* TYPOGRAPHY */
  --font-display: 'Outfit', system-ui, sans-serif;
  --font-mono:    'JetBrains Mono', 'Fira Code', monospace;

  --text-xs:    0.75rem;     /* 12px */
  --text-sm:    0.875rem;    /* 14px */
  --text-base:  1rem;        /* 16px */
  --text-lg:    1.125rem;    /* 18px */
  --text-xl:    1.25rem;     /* 20px */
  --text-2xl:   1.5rem;      /* 24px */
  --text-3xl:   2rem;        /* 32px */
  --text-4xl:   2.5rem;      /* 40px */
  --text-hero:  clamp(2.5rem, 5vw, 4.5rem);

  /* FONT WEIGHTS */
  --fw-light:    300;
  --fw-regular:  400;
  --fw-medium:   500;
  --fw-semibold: 600;
  --fw-bold:     700;
  --fw-black:    800;

  /* LINE HEIGHTS */
  --lh-tight:  1.2;
  --lh-snug:   1.4;
  --lh-normal: 1.6;
  --lh-relaxed: 1.8;

  /* LETTER SPACING */
  --ls-tight:  -0.03em;
  --ls-normal: 0;
  --ls-wide:   0.05em;
  --ls-wider:  0.08em;
  --ls-widest: 0.12em;

  /* SPACING SCALE */
  --sp-0:   0;
  --sp-px:  1px;
  --sp-0-5: 0.125rem;  /* 2px */
  --sp-1:   0.25rem;   /* 4px */
  --sp-1-5: 0.375rem;  /* 6px */
  --sp-2:   0.5rem;    /* 8px */
  --sp-2-5: 0.625rem;  /* 10px */
  --sp-3:   0.75rem;   /* 12px */
  --sp-4:   1rem;      /* 16px */
  --sp-5:   1.25rem;   /* 20px */
  --sp-6:   1.5rem;    /* 24px */
  --sp-7:   1.75rem;   /* 28px */
  --sp-8:   2rem;      /* 32px */
  --sp-10:  2.5rem;    /* 40px */
  --sp-12:  3rem;      /* 48px */
  --sp-16:  4rem;      /* 64px */
  --sp-20:  5rem;      /* 80px */
  --sp-24:  6rem;      /* 96px */

  /* BORDER RADIUS */
  --r-xs:   4px;
  --r-sm:   6px;
  --r-md:   10px;
  --r-lg:   16px;
  --r-xl:   24px;
  --r-2xl:  32px;
  --r-full: 9999px;

  /* TRANSITIONS */
  --t-instant: 0ms;
  --t-fast:    150ms ease;
  --t-base:    250ms ease;
  --t-slow:    400ms cubic-bezier(0.4, 0, 0.2, 1);
  --t-bounce:  500ms cubic-bezier(0.34, 1.56, 0.64, 1);

  /* Z-INDEX */
  --z-base:    1;
  --z-raised:  10;
  --z-dropdown: 100;
  --z-sticky:  200;
  --z-overlay: 300;
  --z-modal:   400;
  --z-toast:   500;
  --z-top:     9999;

  /* LAYOUT */
  --sidebar-width:      220px;
  --sidebar-collapsed:  56px;
  --navbar-height:      56px;
  --bottombar-height:   64px;
  --chat-width:         300px;
  --chat-width-max:     400px;
  --chat-width-min:     240px;
}

/* ── LIGHT THEME OVERRIDE ── */
[data-theme="light"] {
  --bg-void:      #D6DCF0;
  --bg-base:      #E8EDF8;
  --bg-surface:   #FFFFFF;
  --bg-elevated:  #F5F8FF;
  --bg-overlay:   #EEF2FC;
  --bg-hover:     rgba(0,0,0,0.03);
  --bg-active:    rgba(0,212,255,0.08);

  --text-primary:   #0D0F17;
  --text-secondary: #3A4560;
  --text-muted:     #7B8DB0;
  --text-disabled:  #B0BACC;
  --text-inverse:   #F0F4FF;

  --border-subtle: rgba(0,0,0,0.06);
  --border-normal: rgba(0,0,0,0.12);
  --border-strong: rgba(0,0,0,0.20);

  --shadow-xs: 0 1px 4px rgba(0,0,0,0.06);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-lg: 0 8px 48px rgba(0,0,0,0.14);
}

/* ── GLOBAL BASE ── */
html, body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-display);
  font-size: var(--text-base);
  line-height: var(--lh-normal);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
  height: 100%;
}

#root { height: 100vh; overflow: hidden; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-normal); border-radius: var(--r-full); }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── SELECTION ── */
::selection { background: var(--accent-primary-glow); color: var(--accent-primary); }

/* ── FOCUS ── */
:focus-visible {
  outline: 2px solid var(--accent-primary);
  outline-offset: 2px;
  border-radius: var(--r-sm);
}

/* ═══════════════════════════════════════════
   KEYFRAME ANIMATIONS
   ═══════════════════════════════════════════ */

@keyframes pulse-live {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--status-live-glow); }
  50% { opacity: 0.8; box-shadow: 0 0 0 6px transparent; }
}

@keyframes breathe {
  0%, 100% { transform: scaleY(1) translateY(0); }
  50% { transform: scaleY(1.015) translateY(-3px); }
}

@keyframes float-particle {
  0% { opacity: 0; transform: translateY(0) translateX(0) scale(0.5); }
  15% { opacity: 1; }
  85% { opacity: 0.4; }
  100% { opacity: 0; transform: translateY(-120px) translateX(var(--tx, 0px)) scale(1); }
}

@keyframes glow-pulse-cyan {
  0%, 100% { box-shadow: var(--shadow-glow-cyan); }
  50% { box-shadow: var(--shadow-glow-cyan-lg); }
}

@keyframes typing-bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-5px); opacity: 1; }
}

@keyframes slide-up {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes slide-right {
  from { opacity: 0; transform: translateX(-12px); }
  to   { opacity: 1; transform: translateX(0); }
}

@keyframes slide-down {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fade-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes scale-in {
  from { opacity: 0; transform: scale(0.92); }
  to   { opacity: 1; transform: scale(1); }
}

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes blink {
  0%, 45%, 55%, 100% { transform: scaleY(1); }
  50% { transform: scaleY(0.08); }
}

@keyframes mouth-talk {
  0%, 100% { d: path("M85,112 Q100,118 115,112"); }
  25% { d: path("M85,112 Q100,124 115,112"); }
  50% { d: path("M85,112 Q100,120 115,112"); }
  75% { d: path("M85,112 Q100,126 115,112"); }
}

@keyframes bounce-in {
  0% { transform: scale(0.7); opacity: 0; }
  60% { transform: scale(1.05); }
  80% { transform: scale(0.97); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes toast-enter {
  from { opacity: 0; transform: translateY(100%) scale(0.9); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes progress-fill {
  from { width: 0; }
}

@keyframes excited-shake {
  0%, 100% { transform: translateY(0) rotate(0); }
  20% { transform: translateY(-6px) rotate(-1deg); }
  40% { transform: translateY(-4px) rotate(1deg); }
  60% { transform: translateY(-8px) rotate(-0.5deg); }
  80% { transform: translateY(-3px) rotate(0.5deg); }
}

@keyframes scan-line {
  0% { top: 0%; opacity: 0.6; }
  100% { top: 100%; opacity: 0; }
}

select option{background:var(--bg-elevated);color:var(--text-primary);}
::placeholder{color:var(--text-muted);opacity:0.8;}
button,label{user-select:none;-webkit-user-select:none;}

<script type="text/babel" data-presets="react">
// ③ ATOMS
/* ─────────────────────────────────────────────
   AlterCast — Atoms v1.0
   Smallest building blocks: badges, chips,
   status dots, toggles, avatars, loaders, etc.
   ───────────────────────────────────────────── */

/* ══ STATUS DOT ══ */
function StatusDot({ status = "offline", pulse = false, size = 8 }) {
  const colors = {
    live:    "var(--status-live)",
    online:  "var(--status-online)",
    warning: "var(--status-warning)",
    offline: "var(--status-offline)",
    info:    "var(--status-info)",
    idle:    "var(--status-warning)",
  };
  return (
    <span style={{
      display: "inline-block",
      width: size, height: size,
      borderRadius: "50%",
      backgroundColor: colors[status] || colors.offline,
      flexShrink: 0,
      animation: pulse && status === "live" ? "pulse-live 1.6s ease infinite" : "none",
      boxShadow: status === "live" ? `0 0 0 0 ${colors.live}` : "none",
    }} />
  );
}

/* ══ BADGE ══ */
function Badge({ children, variant = "default", size = "sm", glow = false, style = {} }) {
  const variants = {
    default:   { bg: "var(--bg-elevated)", color: "var(--text-secondary)", border: "var(--border-subtle)" },
    primary:   { bg: "rgba(0,212,255,0.12)", color: "var(--accent-primary)", border: "rgba(0,212,255,0.25)" },
    secondary: { bg: "rgba(124,58,255,0.12)", color: "var(--accent-secondary)", border: "rgba(124,58,255,0.25)" },
    live:      { bg: "rgba(255,60,60,0.12)", color: "var(--status-live)", border: "rgba(255,60,60,0.3)" },
    online:    { bg: "rgba(0,255,136,0.10)", color: "var(--status-online)", border: "rgba(0,255,136,0.25)" },
    warning:   { bg: "rgba(255,184,0,0.10)", color: "var(--status-warning)", border: "rgba(255,184,0,0.25)" },
    danger:    { bg: "rgba(255,60,60,0.12)", color: "#FF6B6B", border: "rgba(255,60,60,0.25)" },
    ghost:     { bg: "transparent", color: "var(--text-muted)", border: "var(--border-subtle)" },
  };
  const sizes = {
    xs: { fontSize: "0.625rem", padding: "1px 6px", height: "16px" },
    sm: { fontSize: "0.7rem",   padding: "2px 8px",  height: "20px" },
    md: { fontSize: "0.75rem",  padding: "3px 10px", height: "24px" },
    lg: { fontSize: "0.875rem", padding: "4px 12px", height: "28px" },
  };
  const v = variants[variant] || variants.default;
  const s = sizes[size] || sizes.sm;
  return (
    <span style={{
      display: "inline-flex", alignItems: "center",
      backgroundColor: v.bg, color: v.color,
      border: `1px solid ${v.border}`,
      borderRadius: "var(--r-full)",
      fontFamily: "var(--font-display)",
      fontWeight: 600,
      letterSpacing: "0.07em",
      textTransform: "uppercase",
      lineHeight: 1,
      whiteSpace: "nowrap",
      boxShadow: glow ? `0 0 12px ${v.bg}` : "none",
      ...s, ...style
    }}>
      {children}
    </span>
  );
}

/* ══ LIVE BADGE (animated) ══ */
function LiveBadge({ isLive = false, lang = "id" }) {
  const label = isLive ? (lang === "id" ? "SIARAN" : "LIVE") : (lang === "id" ? "OFFLINE" : "OFFLINE");
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: "6px",
      background: isLive ? "rgba(255,60,60,0.12)" : "rgba(74,85,104,0.2)",
      border: `1px solid ${isLive ? "rgba(255,60,60,0.35)" : "var(--border-subtle)"}`,
      borderRadius: "var(--r-full)",
      padding: "4px 10px",
      fontSize: "0.7rem", fontWeight: 700,
      letterSpacing: "0.1em",
      color: isLive ? "var(--status-live)" : "var(--text-muted)",
    }}>
      <StatusDot status={isLive ? "live" : "offline"} pulse={isLive} size={6} />
      {label}
    </div>
  );
}

/* ══ CHIP ══ */
function Chip({ children, selected = false, onClick, icon, removable = false, onRemove, disabled = false }) {
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      style={{
        display: "inline-flex", alignItems: "center", gap: "6px",
        background: selected ? "var(--accent-primary-glow)" : "var(--bg-elevated)",
        border: `1px solid ${selected ? "var(--border-accent)" : "var(--border-subtle)"}`,
        borderRadius: "var(--r-full)",
        padding: "5px 12px",
        fontSize: "var(--text-sm)",
        fontFamily: "var(--font-display)",
        fontWeight: 500,
        color: selected ? "var(--accent-primary)" : "var(--text-secondary)",
        cursor: disabled ? "not-allowed" : "pointer",
        transition: "all var(--t-fast)",
        opacity: disabled ? 0.5 : 1,
        outline: "none",
      }}
      onMouseOver={e => !disabled && !selected && (e.currentTarget.style.borderColor = "var(--border-normal)")}
      onMouseOut={e => !disabled && !selected && (e.currentTarget.style.borderColor = "var(--border-subtle)")}
    >
      {icon && <span style={{ display: "flex", opacity: 0.8 }}>{icon}</span>}
      {children}
      {removable && (
        <span
          onClick={e => { e.stopPropagation(); onRemove && onRemove(); }}
          style={{ display: "flex", opacity: 0.6, cursor: "pointer" }}
        >
          <IcX size={12} />
        </span>
      )}
    </button>
  );
}

/* ══ TOGGLE / SWITCH ══ */
function Toggle({ checked = false, onChange, size = "md", label, disabled = false }) {
  const sizes = {
    sm: { width: 28, height: 16, knob: 10, offset: 2 },
    md: { width: 36, height: 20, knob: 14, offset: 3 },
    lg: { width: 44, height: 24, knob: 18, offset: 3 },
  };
  const s = sizes[size] || sizes.md;
  return (
    <label style={{
      display: "inline-flex", alignItems: "center", gap: "8px",
      cursor: disabled ? "not-allowed" : "pointer",
      opacity: disabled ? 0.5 : 1,
    }}>
      <div
        onClick={() => !disabled && onChange && onChange(!checked)}
        style={{
          position: "relative",
          width: s.width, height: s.height,
          borderRadius: s.height / 2,
          background: checked ? "var(--accent-primary)" : "var(--bg-overlay)",
          border: `1px solid ${checked ? "var(--accent-primary)" : "var(--border-normal)"}`,
          transition: "all var(--t-fast)",
          boxShadow: checked ? "0 0 12px rgba(0,212,255,0.3)" : "none",
          flexShrink: 0,
        }}
      >
        <div style={{
          position: "absolute",
          top: s.offset, left: checked ? s.width - s.knob - s.offset : s.offset,
          width: s.knob, height: s.knob,
          borderRadius: "50%",
          background: checked ? "var(--text-inverse)" : "var(--text-muted)",
          transition: "left var(--t-fast), background var(--t-fast)",
        }} />
      </div>
      {label && (
        <span style={{
          fontSize: "var(--text-sm)",
          color: checked ? "var(--text-primary)" : "var(--text-secondary)",
          fontWeight: 500,
        }}>
          {label}
        </span>
      )}
    </label>
  );
}

/* ══ AVATAR CIRCLE ══ */
function AvatarCircle({ name = "?", size = 32, src, color, status }) {
  const colors = ["#00D4FF","#7C3AFF","#00FF88","#FFB800","#FF3C3C","#FF6B9D","#4ECDC4","#45B7D1"];
  const bgColor = color || colors[name.charCodeAt(0) % colors.length];
  const initials = name.slice(0, 2).toUpperCase();
  return (
    <div style={{ position: "relative", flexShrink: 0 }}>
      <div style={{
        width: size, height: size,
        borderRadius: "50%",
        background: src ? "transparent" : `${bgColor}22`,
        border: `1.5px solid ${bgColor}55`,
        display: "flex", alignItems: "center", justifyContent: "center",
        overflow: "hidden",
        fontSize: size * 0.38,
        fontWeight: 700,
        color: bgColor,
        fontFamily: "var(--font-display)",
      }}>
        {src
          ? <img src={src} alt={name} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
          : initials
        }
      </div>
      {status && (
        <div style={{
          position: "absolute", bottom: 1, right: 1,
        }}>
          <StatusDot status={status} size={8} />
        </div>
      )}
    </div>
  );
}

/* ══ LOADER / SPINNER ══ */
function Spinner({ size = 20, color = "var(--accent-primary)", thickness = 2 }) {
  return (
    <div style={{
      width: size, height: size,
      borderRadius: "50%",
      border: `${thickness}px solid rgba(0,212,255,0.15)`,
      borderTopColor: color,
      animation: "spin 0.8s linear infinite",
      flexShrink: 0,
    }} />
  );
}

/* ══ SKELETON ══ */
function Skeleton({ width = "100%", height = 16, radius = "var(--r-sm)", style = {} }) {
  return (
    <div style={{
      width, height,
      borderRadius: radius,
      background: "linear-gradient(90deg, var(--bg-elevated) 25%, var(--bg-overlay) 50%, var(--bg-elevated) 75%)",
      backgroundSize: "200% 100%",
      animation: "shimmer 1.5s ease infinite",
      ...style
    }} />
  );
}

/* ══ PROGRESS BAR ══ */
function ProgressBar({ value = 0, max = 100, color = "var(--accent-primary)", height = 4, glow = false, animated = false }) {
  const pct = Math.min(100, Math.max(0, (value / max) * 100));
  return (
    <div style={{
      width: "100%", height,
      background: "var(--bg-overlay)",
      borderRadius: "var(--r-full)",
      overflow: "hidden",
    }}>
      <div style={{
        height: "100%",
        width: `${pct}%`,
        background: color,
        borderRadius: "var(--r-full)",
        transition: animated ? "width 0.6s ease" : "none",
        boxShadow: glow ? `0 0 8px ${color}` : "none",
      }} />
    </div>
  );
}

/* ══ DIVIDER ══ */
function Divider({ label, style = {} }) {
  if (!label) {
    return <div style={{ height: 1, background: "var(--border-subtle)", width: "100%", ...style }} />;
  }
  return (
    <div style={{ display: "flex", alignItems: "center", gap: "8px", ...style }}>
      <div style={{ flex: 1, height: 1, background: "var(--border-subtle)" }} />
      <span style={{ fontSize: "var(--text-xs)", color: "var(--text-muted)", fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", whiteSpace: "nowrap" }}>
        {label}
      </span>
      <div style={{ flex: 1, height: 1, background: "var(--border-subtle)" }} />
    </div>
  );
}

/* ══ KEYBOARD SHORTCUT ══ */
function Kbd({ children }) {
  return (
    <kbd style={{
      display: "inline-flex", alignItems: "center", justifyContent: "center",
      background: "var(--bg-overlay)",
      border: "1px solid var(--border-normal)",
      borderBottomWidth: "2px",
      borderRadius: "var(--r-xs)",
      padding: "1px 6px",
      fontSize: "0.65rem",
      fontFamily: "var(--font-mono)",
      fontWeight: 600,
      color: "var(--text-secondary)",
      lineHeight: 1.6,
    }}>
      {children}
    </kbd>
  );
}

/* ══ TYPING INDICATOR ══ */
function TypingIndicator({ label = "AI is typing" }) {
  return (
    <div style={{
      display: "inline-flex", alignItems: "center", gap: "8px",

      <span style={{ fontSize: "var(--text-xs)", color: "var(--text-muted)", fontStyle: "italic" }}>
        {label}
      </span>
    </div>
  );
}

function EmotionTag({ emotion = "idle", lang = "id", size = "sm" }) {

function PlatformBadge({ platform = "twitch", connected = false }) {
  const platforms = {
    twitch:  { icon: <IcTwitch size={12} />, color: "#9146FF", name: "Twitch" },
    youtube: { icon: <IcYouTube size={12} />, color: "#FF0000", name: "YouTube" },
    tiktok:  { icon: <IcTikTok size={12} />, color: "#ff0050", name: "TikTok" },
  };
  const p = platforms[platform] || platforms.twitch;
  return (
    <div style={{
      display: "inline-flex", alignItems: "center", gap: "5px",
      background: connected ? `${p.color}18` : "var(--bg-elevated)",
      border: `1px solid ${connected ? `${p.color}40` : "var(--border-subtle)"}`,
      borderRadius: "var(--r-full)",
      padding: "3px 8px",
      fontSize: "0.7rem", fontWeight: 600,
      color: connected ? p.color : "var(--text-muted)",
    }}>
      <span style={{ color: p.color }}>{p.icon}</span>
      {p.name}
      <StatusDot status={connected ? "online" : "offline"} size={5} />
    </div>
  );
}

/* ══ STAT CARD ══ */
function StatCard({ label, value, icon, trend, color = "var(--accent-primary)", style = {} }) {
  return (
    <div style={{
      background: "var(--bg-surface)",
      border: "1px solid var(--border-subtle)",
      borderRadius: "var(--r-md)",
      padding: "16px",
      display: "flex", flexDirection: "column", gap: "8px",
      ...style
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <span style={{ fontSize: "var(--text-xs)", color: "var(--text-muted)", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em" }}>
          {label}
        </span>
        {icon && (
          <div style={{
            width: 28, height: 28,
            borderRadius: "var(--r-sm)",
            background: `${color}15`,
            display: "flex", alignItems: "center", justifyContent: "center",
            color: color,
          }}>
            {icon}
          </div>
        )}
      </div>
      <div style={{ fontSize: "var(--text-2xl)", fontWeight: 800, color: "var(--text-primary)", lineHeight: 1 }}>
        {value}
      </div>
      {trend !== undefined && (
        <div style={{ fontSize: "var(--text-xs)", color: trend >= 0 ? "var(--status-online)" : "var(--status-live)", fontWeight: 600 }}>
          {trend >= 0 ? "▲" : "▼"} {Math.abs(trend)}% vs kemarin
        </div>
      )}
    </div>
  );
}

/* ══ TAG / LABEL ══ */
function Tag({ children, color = "default", dot = false }) {
  const colors = {
    default:  { bg: "var(--bg-elevated)", text: "var(--text-secondary)", dot: "var(--text-muted)" },
    cyan:     { bg: "rgba(0,212,255,0.1)",  text: "#00D4FF", dot: "#00D4FF" },
    violet:   { bg: "rgba(124,58,255,0.1)", text: "#7C3AFF", dot: "#7C3AFF" },
    green:    { bg: "rgba(0,255,136,0.1)",  text: "#00FF88", dot: "#00FF88" },
    amber:    { bg: "rgba(255,184,0,0.1)",  text: "#FFB800", dot: "#FFB800" },
    red:      { bg: "rgba(255,60,60,0.1)",  text: "#FF6B6B", dot: "#FF3C3C" },
  };
  const c = colors[color] || colors.default;
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: "5px",
      background: c.bg,
      borderRadius: "var(--r-sm)",
      padding: "2px 8px",
      fontSize: "var(--text-xs)",
      fontWeight: 600,
      color: c.text,
      lineHeight: 1.6,
    }}>
      {dot && <span style={{ width: 5, height: 5, borderRadius: "50%", background: c.dot, flexShrink: 0 }} />}
      {children}
    </span>
  );
}

/* ══ EXPORT ══ */
Object.assign(window, {
  StatusDot, Badge, LiveBadge, Chip, Toggle, AvatarCircle,
  Spinner, Skeleton, ProgressBar, Divider, Kbd, TypingIndicator,
  EmotionTag, EMOTION_CONFIG, PlatformBadge, StatCard, Tag,
});

</script>

<script type="text/babel" data-presets="react">
// ④ UI COMPONENTS
/* ─────────────────────────────────────────────
   AlterCast — UI Components v1.0
   Buttons, Inputs, Panels, Modals, Toasts,
   Sliders, Selects, Cards
   ───────────────────────────────────────────── */

/* ══ BUTTON ══ */
function Button({
  children, onClick, variant = "primary", size = "md",
  icon, iconRight, disabled = false, loading = false,
  fullWidth = false, style = {}, ...rest
}) {
  const [hovered, setHovered] = React.useState(false);
  const variants = {
    primary: {
      bg: hovered ? "var(--accent-primary-dim)" : "var(--accent-primary)",
      color: "var(--text-inverse)",
      border: "var(--accent-primary)",
      shadow: hovered ? "var(--shadow-glow-cyan)" : "none",
    },
    secondary: {
      bg: hovered ? "rgba(124,58,255,0.2)" : "rgba(124,58,255,0.12)",
      color: "var(--accent-secondary)",
      border: "rgba(124,58,255,0.35)",
      shadow: hovered ? "var(--shadow-glow-violet)" : "none",
    },
    outline: {
      bg: hovered ? "var(--bg-hover)" : "transparent",
      color: "var(--accent-primary)",
      border: "var(--border-accent)",
      shadow: "none",
    },
    ghost: {
      bg: hovered ? "var(--bg-hover)" : "transparent",
      color: "var(--text-secondary)",
      border: "transparent",
      shadow: "none",
    },
    danger: {
      bg: hovered ? "rgba(255,60,60,0.2)" : "rgba(255,60,60,0.12)",
      color: "var(--status-live)",
      border: "rgba(255,60,60,0.35)",
      shadow: hovered ? "var(--shadow-glow-live)" : "none",
    },
    surface: {
      bg: hovered ? "var(--bg-elevated)" : "var(--bg-surface)",
      color: "var(--text-primary)",
      border: "var(--border-normal)",
      shadow: "none",
    },
    live: {
      bg: hovered ? "#cc2f2f" : "var(--status-live)",
      color: "#fff",
      border: "var(--status-live)",
      shadow: hovered ? "var(--shadow-glow-live)" : "none",
    },
  };
  const sizes = {
    xs: { height: "24px", px: "8px",  fontSize: "var(--text-xs)", gap: "4px", iconSize: 12, radius: "var(--r-sm)" },
    sm: { height: "30px", px: "12px", fontSize: "var(--text-sm)", gap: "5px", iconSize: 14, radius: "var(--r-sm)" },
    md: { height: "36px", px: "16px", fontSize: "var(--text-sm)", gap: "6px", iconSize: 15, radius: "var(--r-md)" },
    lg: { height: "44px", px: "20px", fontSize: "var(--text-base)", gap: "8px", iconSize: 16, radius: "var(--r-md)" },
    xl: { height: "52px", px: "28px", fontSize: "var(--text-lg)", gap: "8px", iconSize: 18, radius: "var(--r-lg)" },
  };
  const v = variants[variant] || variants.primary;
  const s = sizes[size] || sizes.md;
  const isDisabled = disabled || loading;
  return (
    <button
      onClick={onClick}
      disabled={isDisabled}
      onMouseEnter={() => !isDisabled && setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        gap: s.gap,
        height: s.height, padding: `0 ${s.px}`,
        background: v.bg, color: v.color,
        border: `1px solid ${v.border}`,
        borderRadius: s.radius,
        fontSize: s.fontSize, fontWeight: 600,
        fontFamily: "var(--font-display)",
        cursor: isDisabled ? "not-allowed" : "pointer",
        opacity: isDisabled ? 0.5 : 1,
        transition: "all var(--t-fast)",
        boxShadow: v.shadow,
        width: fullWidth ? "100%" : "auto",
        whiteSpace: "nowrap",
        outline: "none",
        letterSpacing: "0.01em",
        ...style
      }}
      {...rest}
    >
      {loading ? <Spinner size={s.iconSize} color={v.color} /> : (
        icon && React.cloneElement(icon, { size: s.iconSize, color: v.color })
      )}
      {children}
      {iconRight && !loading && React.cloneElement(iconRight, { size: s.iconSize, color: v.color })}
    </button>
  );
}

/* ══ ICON BUTTON ══ */
function IconButton({ icon, onClick, variant = "ghost", size = "md", tooltip, active = false, disabled = false, style = {} }) {
  const [hovered, setHovered] = React.useState(false);
  const sizes = { sm: 28, md: 32, lg: 40 };
  const iconSizes = { sm: 14, md: 16, lg: 18 };
  const s = sizes[size] || sizes.md;
  const is = iconSizes[size] || iconSizes.md;
  const getStyle = () => {
    if (active) return { bg: "var(--accent-primary-glow)", color: "var(--accent-primary)", border: "var(--border-accent)" };
    if (hovered) return { bg: "var(--bg-hover)", color: "var(--text-primary)", border: "var(--border-subtle)" };
    return { bg: "transparent", color: "var(--text-secondary)", border: "transparent" };
  };
  const st = getStyle();
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      title={tooltip}
      onMouseEnter={() => !disabled && setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        width: s, height: s,
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        background: st.bg, color: st.color,
        border: `1px solid ${st.border}`,
        borderRadius: "var(--r-sm)",
        cursor: disabled ? "not-allowed" : "pointer",
        opacity: disabled ? 0.4 : 1,
        transition: "all var(--t-fast)",
        flexShrink: 0,
        outline: "none",
        ...style
      }}
    >
      {React.cloneElement(icon, { size: is })}
    </button>
  );
}

/* ══ INPUT ══ */
function Input({ value, onChange, placeholder, type = "text", icon, iconRight, size = "md", disabled = false, error, style = {} }) {
  const [focused, setFocused] = React.useState(false);
  const sizes = {
    sm: { height: "30px", px: "10px", fontSize: "var(--text-sm)" },
    md: { height: "38px", px: "12px", fontSize: "var(--text-sm)" },
    lg: { height: "44px", px: "14px", fontSize: "var(--text-base)" },
  };
  const s = sizes[size] || sizes.md;
  return (
    <div style={{ position: "relative", width: "100%", ...style }}>
      {icon && (
        <div style={{
          position: "absolute", left: s.px, top: "50%", transform: "translateY(-50%)",
          color: focused ? "var(--accent-primary)" : "var(--text-muted)",
          display: "flex", transition: "color var(--t-fast)",
        }}>
          {React.cloneElement(icon, { size: 15 })}
        </div>
      )}
      <input
        type={type}
        value={value}
        onChange={e => onChange && onChange(e.target.value)}
        placeholder={placeholder}
        disabled={disabled}
        onFocus={() => setFocused(true)}
        onBlur={() => setFocused(false)}
        style={{
          width: "100%", height: s.height,
          padding: `0 ${icon ? "36px" : s.px}`,
          paddingRight: iconRight ? "36px" : s.px,
          background: "var(--bg-elevated)",
          border: `1px solid ${error ? "var(--status-live)" : focused ? "var(--border-focus)" : "var(--border-normal)"}`,
          borderRadius: "var(--r-md)",
          color: "var(--text-primary)",
          fontSize: s.fontSize,
          fontFamily: "var(--font-display)",
          outline: "none",
          transition: "border-color var(--t-fast), box-shadow var(--t-fast)",
          boxShadow: focused ? `0 0 0 3px ${error ? "rgba(255,60,60,0.15)" : "var(--accent-primary-glow)"}` : "none",
          opacity: disabled ? 0.5 : 1,
          cursor: disabled ? "not-allowed" : "text",
        }}
      />
      {iconRight && (
        <div style={{
          position: "absolute", right: s.px, top: "50%", transform: "translateY(-50%)",
          color: "var(--text-muted)", display: "flex",
        }}>
          {React.cloneElement(iconRight, { size: 15 })}
        </div>
      )}
      {error && (
        <div style={{ fontSize: "var(--text-xs)", color: "var(--status-live)", marginTop: "4px", paddingLeft: "4px" }}>
          {error}
        </div>
      )}
    </div>
  );
}

/* ══ TEXTAREA ══ */
function Textarea({ value, onChange, placeholder, rows = 4, disabled = false, style = {} }) {
  const [focused, setFocused] = React.useState(false);
  return (
    <textarea
      value={value}
      onChange={e => onChange && onChange(e.target.value)}
      placeholder={placeholder}
      rows={rows}
      disabled={disabled}
      onFocus={() => setFocused(true)}
      onBlur={() => setFocused(false)}
      style={{
        width: "100%",
        padding: "10px 12px",
        background: "var(--bg-elevated)",
        border: `1px solid ${focused ? "var(--border-focus)" : "var(--border-normal)"}`,
        borderRadius: "var(--r-md)",
        color: "var(--text-primary)",
        fontSize: "var(--text-sm)",
        fontFamily: "var(--font-display)",
        resize: "vertical",
        outline: "none",
        transition: "border-color var(--t-fast)",
        boxShadow: focused ? "0 0 0 3px var(--accent-primary-glow)" : "none",
        lineHeight: 1.6,
        ...style
      }}
    />
  );
}

/* ══ SELECT ══ */
function Select({ value, onChange, options = [], disabled = false, style = {} }) {
  const [focused, setFocused] = React.useState(false);
  return (
    <div style={{ position: "relative", ...style }}>
      <select
        value={value}
        onChange={e => onChange && onChange(e.target.value)}
        disabled={disabled}
        onFocus={() => setFocused(true)}
        onBlur={() => setFocused(false)}
        style={{
          width: "100%", height: "38px",
          padding: "0 32px 0 12px",
          background: "var(--bg-elevated)",
          border: `1px solid ${focused ? "var(--border-focus)" : "var(--border-normal)"}`,
          borderRadius: "var(--r-md)",
          color: "var(--text-primary)",
          fontSize: "var(--text-sm)",
          fontFamily: "var(--font-display)",
          outline: "none",
          cursor: disabled ? "not-allowed" : "pointer",
          appearance: "none",
          transition: "border-color var(--t-fast)",
        }}
      >
        {options.map(opt => (
          <option key={opt.value} value={opt.value} style={{ background: "var(--bg-elevated)" }}>
            {opt.label}
          </option>
        ))}
      </select>
      <div style={{
        position: "absolute", right: "10px", top: "50%", transform: "translateY(-50%)",
        color: "var(--text-muted)", pointerEvents: "none",
      }}>
        <IcChevronDown size={14} />
      </div>
    </div>
  );
}

/* ══ RANGE SLIDER ══ */
function RangeSlider({ value, onChange, min = 0, max = 100, step = 1, color = "var(--accent-primary)", label, valueLabel }) {
  const pct = ((value - min) / (max - min)) * 100;
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "6px", width: "100%" }}>
      {(label || valueLabel !== undefined) && (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          {label && <span style={{ fontSize: "var(--text-xs)", color: "var(--text-secondary)", fontWeight: 500 }}>{label}</span>}
          {valueLabel !== undefined && (
            <span style={{ fontSize: "var(--text-xs)", color: color, fontFamily: "var(--font-mono)", fontWeight: 600 }}>{valueLabel}</span>
          )}
        </div>
      )}
      <div style={{ position: "relative", height: "20px", display: "flex", alignItems: "center" }}>
        <div style={{
          position: "absolute", height: "4px", width: "100%",
          background: "var(--bg-overlay)", borderRadius: "var(--r-full)", overflow: "hidden",
        }}>
          <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: "var(--r-full)", transition: "width 0.1s" }} />
        </div>
        <input
          type="range" min={min} max={max} step={step} value={value}
          onChange={e => onChange && onChange(Number(e.target.value))}
          style={{
            position: "absolute", width: "100%", height: "100%",
            opacity: 0, cursor: "pointer", margin: 0,
          }}
        />
        <div style={{
          position: "absolute",
          left: `calc(${pct}% - 8px)`,
          width: "16px", height: "16px",
          borderRadius: "50%",
          background: color,
          border: "2px solid var(--bg-base)",
          boxShadow: `0 0 8px ${color}50`,
          transition: "left 0.1s",
          pointerEvents: "none",
        }} />
      </div>
    </div>
  );
}

/* ══ PANEL ══ */
function Panel({ children, title, icon, glow = false, variant = "default", footer, actions, style = {}, bodyStyle = {} }) {
  const borderColors = {
    default: "var(--border-subtle)",
    accent: "var(--border-accent)",
    live: "var(--border-live)",
    violet: "var(--border-violet)",
  };
  return (
    <div style={{
      background: "var(--bg-surface)",
      border: `1px solid ${borderColors[variant] || borderColors.default}`,
      borderRadius: "var(--r-lg)",
      overflow: "hidden",
      boxShadow: glow
        ? (variant === "live" ? "var(--shadow-glow-live)" : "var(--shadow-glow-cyan)")
        : "var(--shadow-sm)",
      display: "flex", flexDirection: "column",
      ...style
    }}>
      {(title || actions) && (
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "12px 16px",
          borderBottom: "1px solid var(--border-subtle)",
          flexShrink: 0,
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
            {icon && <span style={{ color: "var(--accent-primary)", display: "flex" }}>{icon}</span>}
            <span style={{
              fontSize: "var(--text-xs)", fontWeight: 700, textTransform: "uppercase",
              letterSpacing: "0.1em", color: "var(--text-secondary)",
            }}>
              {title}
            </span>
          </div>
          {actions && <div style={{ display: "flex", gap: "4px" }}>{actions}</div>}
        </div>
      )}
      <div style={{ flex: 1, overflow: "auto", ...bodyStyle }}>
        {children}
      </div>
      {footer && (
        <div style={{ padding: "10px 16px", borderTop: "1px solid var(--border-subtle)", flexShrink: 0 }}>
          {footer}
        </div>
      )}
    </div>
  );
}

/* ══ MODAL ══ */
function Modal({ open, onClose, title, children, footer, width = 480 }) {
  if (!open) return null;
  return (
    <div
      onClick={e => e.target === e.currentTarget && onClose && onClose()}
      style={{
        position: "fixed", inset: 0,
        background: "rgba(8,10,15,0.8)",
        backdropFilter: "blur(8px)",
        display: "flex", alignItems: "center", justifyContent: "center",
        zIndex: "var(--z-modal)",
        animation: "fade-in 0.2s ease",
        padding: "20px",
      }}
    >
      <div style={{
        background: "var(--bg-elevated)",
        border: "1px solid var(--border-normal)",
        borderRadius: "var(--r-xl)",
        width: "100%", maxWidth: width,
        boxShadow: "var(--shadow-lg)",
        animation: "scale-in 0.2s ease",
        overflow: "hidden",
      }}>
        {title && (
          <div style={{
            display: "flex", alignItems: "center", justifyContent: "space-between",
            padding: "18px 20px",
            borderBottom: "1px solid var(--border-subtle)",
          }}>
            <span style={{ fontWeight: 700, fontSize: "var(--text-lg)" }}>{title}</span>
            <IconButton icon={<IcX />} onClick={onClose} size="sm" />
          </div>
        )}
        <div style={{ padding: "20px" }}>{children}</div>
        {footer && (
          <div style={{
            padding: "14px 20px",
            borderTop: "1px solid var(--border-subtle)",
            display: "flex", justifyContent: "flex-end", gap: "8px",
          }}>
            {footer}
          </div>
        )}
      </div>
    </div>
  );
}

/* ══ TOAST ══ */
function Toast({ message, type = "default", onDismiss }) {
  const types = {
    default: { bg: "var(--bg-elevated)", border: "var(--border-normal)",  icon: <IcInfo size={14} />,          color: "var(--text-secondary)" },
    success: { bg: "rgba(0,255,136,0.1)", border: "rgba(0,255,136,0.3)", icon: <IcCheck size={14} />,         color: "var(--status-online)" },
    error:   { bg: "rgba(255,60,60,0.1)", border: "rgba(255,60,60,0.3)", icon: <IcAlertTriangle size={14} />, color: "var(--status-live)" },
    warning: { bg: "rgba(255,184,0,0.1)", border: "rgba(255,184,0,0.3)", icon: <IcAlertTriangle size={14} />, color: "var(--status-warning)" },
    info:    { bg: "rgba(0,212,255,0.1)", border: "rgba(0,212,255,0.3)", icon: <IcInfo size={14} />,          color: "var(--accent-primary)" },
  };
  const t = types[type] || types.default;
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: "10px",
      background: t.bg, border: `1px solid ${t.border}`,
      borderRadius: "var(--r-lg)",
      padding: "10px 14px",
      animation: "toast-enter 0.3s ease",
      backdropFilter: "blur(12px)",
      minWidth: "200px", maxWidth: "380px",
      boxShadow: "var(--shadow-lg)",
    }}>
      <span style={{ color: t.color, display: "flex", flexShrink: 0 }}>{t.icon}</span>
      <span style={{ fontSize: "var(--text-sm)", color: "var(--text-primary)", flex: 1 }}>{message}</span>
      <IconButton icon={<IcX />} onClick={onDismiss} size="sm" style={{ flexShrink: 0 }} />
    </div>
  );
}

/* ══ TOAST CONTAINER ══ */
function ToastContainer({ toasts, onDismiss }) {
  return (
    <div style={{
      position: "fixed", bottom: "80px", left: "50%",
      transform: "translateX(-50%)",
      display: "flex", flexDirection: "column", gap: "8px",
      zIndex: "var(--z-toast)",
      alignItems: "center",
    }}>
      {toasts.map(t => (
        <Toast key={t.id} message={t.message} type={t.type} onDismiss={() => onDismiss(t.id)} />
      ))}
    </div>
  );
}

/* ══ FORM FIELD ══ */
function FormField({ label, children, hint, required = false, style = {} }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "6px", ...style }}>
      {label && (
        <label style={{
          fontSize: "var(--text-xs)", fontWeight: 600,
          color: "var(--text-secondary)", textTransform: "uppercase", letterSpacing: "0.06em",
        }}>
          {label} {required && <span style={{ color: "var(--status-live)" }}>*</span>}
        </label>
      )}
      {children}
      {hint && <span style={{ fontSize: "var(--text-xs)", color: "var(--text-muted)" }}>{hint}</span>}
    </div>
  );
}

/* ══ SECTION HEADER ══ */
function SectionHeader({ label, action }) {
  return (
    <div style={{
      display: "flex", alignItems: "center", justifyContent: "space-between",
      padding: "0 0 8px 0",
      marginBottom: "4px",
    }}>
      <span style={{
        fontSize: "var(--text-xs)", fontWeight: 700,
        color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.1em",
      }}>
        {label}
      </span>
      {action && action}
    </div>
  );
}

/* ══ EMPTY STATE ══ */
function EmptyState({ icon, title, description, action }) {
  return (
    <div style={{
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      gap: "12px", padding: "40px 20px", textAlign: "center",
    }}>
      {icon && (
        <div style={{ color: "var(--text-muted)", opacity: 0.5 }}>
          {React.cloneElement(icon, { size: 32 })}
        </div>
      )}
      <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
        {title && <div style={{ fontSize: "var(--text-sm)", fontWeight: 600, color: "var(--text-secondary)" }}>{title}</div>}
        {description && <div style={{ fontSize: "var(--text-xs)", color: "var(--text-muted)" }}>{description}</div>}
      </div>
      {action && action}
    </div>
  );
}

/* ══ CODE BLOCK ══ */
function CodeBlock({ children, lang = "" }) {
  const [copied, setCopied] = React.useState(false);
  return (
    <div style={{
      position: "relative",
      background: "var(--bg-void)",
      border: "1px solid var(--border-subtle)",
      borderRadius: "var(--r-md)",
      overflow: "hidden",
    }}>
      {lang && (
        <div style={{
          padding: "6px 12px",
          borderBottom: "1px solid var(--border-subtle)",
          fontSize: "var(--text-xs)", color: "var(--text-muted)", fontFamily: "var(--font-mono)",
          display: "flex", justifyContent: "space-between",
        }}>
          <span>{lang}</span>
          <button
            onClick={() => { navigator.clipboard?.writeText(children); setCopied(true); setTimeout(() => setCopied(false), 1500); }}
            style={{ background: "none", border: "none", cursor: "pointer", color: copied ? "var(--status-online)" : "var(--text-muted)", fontSize: "0.7rem", fontFamily: "var(--font-mono)" }}
          >
            {copied ? " copied" : "copy"}
          </button>
        </div>
      )}
      <pre style={{
        padding: "12px", margin: 0,
        fontSize: "var(--text-sm)", fontFamily: "var(--font-mono)",
        color: "var(--text-secondary)", lineHeight: 1.6,
        overflowX: "auto", whiteSpace: "pre-wrap", wordBreak: "break-all",
      }}>
        {children}
      </pre>
    </div>
  );
}

/* ══ EXPORT ══ */
Object.assign(window, {
  Button, IconButton, Input, Textarea, Select, RangeSlider,
  Panel, Modal, Toast, ToastContainer, FormField, SectionHeader,
  EmptyState, CodeBlock,
});

/* ══ WEB SPEECH ENGINE (Indonesian) ══ */
function useSpeech() {
  const [speaking, setSpeaking] = React.useState(false);
  const [mouthOpen, setMouthOpen] = React.useState(0);
  const rafRef = React.useRef(null);
  const synthRef = React.useRef(window.speechSynthesis);

  const animateMouth = React.useCallback((startTime) => {
    const elapsed = Date.now() - startTime;
    const o = Math.max(0, Math.abs(
      Math.sin(elapsed * 0.014) * 0.55 +
      Math.sin(elapsed * 0.031) * 0.25 +
      Math.sin(elapsed * 0.053) * 0.15
    ));
    setMouthOpen(o);
    if (synthRef.current.speaking) {
      rafRef.current = requestAnimationFrame(() => animateMouth(startTime));
    } else {
      setMouthOpen(0); setSpeaking(false);
    }
  }, []);

  const speak = React.useCallback((text, onEnd) => {
    if (!text?.trim()) return;
    synthRef.current.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'id-ID'; u.rate = 1.05; u.pitch = 1.1;
    const voices = synthRef.current.getVoices();
    const idVoice = voices.find(v => v.lang.startsWith('id'));
    if (idVoice) u.voice = idVoice;
    u.onstart = () => { setSpeaking(true); rafRef.current = requestAnimationFrame(() => animateMouth(Date.now())); };
    u.onend = () => { setMouthOpen(0); setSpeaking(false); cancelAnimationFrame(rafRef.current); onEnd?.(); };
    u.onerror = () => { setMouthOpen(0); setSpeaking(false); };
    synthRef.current.speak(u);
  }, [animateMouth]);

  const stop = React.useCallback(() => {
    synthRef.current.cancel();
    setMouthOpen(0); setSpeaking(false);
    cancelAnimationFrame(rafRef.current);
  }, []);

  React.useEffect(() => () => cancelAnimationFrame(rafRef.current), []);
  return { speaking, mouthOpen, speak, stop };
}

/* ══ MIC LIP SYNC ══ */
function useMicLipSync(active) {
  const [amplitude, setAmplitude] = React.useState(0);
  const refs = React.useRef({});
  React.useEffect(() => {
    if (!active) { setAmplitude(0); return; }
    let raf;
    navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(stream => {
      refs.current.stream = stream;
      const ctx = new AudioContext();
      refs.current.ctx = ctx;
      const source = ctx.createMediaStreamSource(stream);
      const analyser = ctx.createAnalyser();
      analyser.fftSize = 256;
      source.connect(analyser);
      const data = new Uint8Array(analyser.frequencyBinCount);
      const loop = () => {
        analyser.getByteTimeDomainData(data);
        let sum = 0;
        for (let i = 0; i < data.length; i++) sum += Math.abs(data[i] - 128);
        setAmplitude(Math.min(1, sum / data.length / 16));
        raf = requestAnimationFrame(loop);
      };
      raf = requestAnimationFrame(loop);
    }).catch(() => {});
    return () => {
      cancelAnimationFrame(raf);
      refs.current.stream?.getTracks().forEach(t => t.stop());
      refs.current.ctx?.close();
    };
  }, [active]);
  return amplitude;
}

        <line key={i} x1={x} y1={106-eyeH+0.5} x2={x+(i-2)*1.5} y2={106-eyeH-4} stroke="#1A0C10" strokeWidth="1.2" strokeLinecap="round"/>
      ))}

      {/* RIGHT EYE */}
      <g clipPath="url(#rightEyeClip)">
        <ellipse cx="126" cy="106" rx="14" ry={eyeH} fill={white}/>
        {!isBlinking && <ellipse cx="126" cy="107" rx="9" ry={Math.min(eyeH*0.85, 9)} fill="url(#irisGrad)"/>}
        {!isBlinking && <ellipse cx="126" cy="108" rx="5.5" ry={Math.min(eyeH*0.55, 6)} fill="url(#pupilGrad)"/>}
        {!isBlinking && <circle cx="130" cy="103" r="2.5" fill="white" opacity="0.9"/>}
        {!isBlinking && <circle cx="122" cy="109" r="1.2" fill="white" opacity="0.5"/>}
      </g>
      <clipPath id="rightEyeClip"><ellipse cx="126" cy="106" rx="14" ry={eyeH}/></clipPath>
      <path d={`M112,106 Q126,${106-eyeH} 140,106`} stroke="#2A1820" strokeWidth="1.8" fill="none" strokeLinecap="round"/>
      {!isBlinking && <path d={`M113,108 Q126,${106+eyeH*0.6} 139,108`} stroke="#2A1820" strokeWidth="0.8" fill="none" opacity="0.5"/>}
      {!isBlinking && [112,118,126,134,140].map((x,i)=>(
        <line key={i} x1={x} y1={106-eyeH+0.5} x2={x+(i-2)*1.5} y2={106-eyeH-4} stroke="#1A0C10" strokeWidth="1.2" strokeLinecap="round"/>
      ))}

      {/* Eye shine */}
      {!isBlinking && <ellipse cx="74" cy="102" rx="4" ry="1.5" fill={cyan} opacity="0.25" filter="url(#softBlur)"/>}
      {!isBlinking && <ellipse cx="126" cy="102" rx="4" ry="1.5" fill={cyan} opacity="0.25" filter="url(#softBlur)"/>}

      {/* ── CHEEK BLUSH ── */}
      {(isHappy || isExcited) && <>
        <ellipse cx="65" cy="125" rx="12" ry="7" fill="rgba(255,140,120,0.22)" filter="url(#softBlur)"/>
        <ellipse cx="135" cy="125" rx="12" ry="7" fill="rgba(255,140,120,0.22)" filter="url(#softBlur)"/>
      </>}

      {/* ── NOSE ── */}
      <path d="M97,128 Q100,134 103,128" stroke={skinShad} strokeWidth="1.2" fill="none" opacity="0.6" strokeLinecap="round"/>
      <circle cx="96.5" cy="132" r="1.2" fill={skinShad} opacity="0.35"/>
      <circle cx="103.5" cy="132" r="1.2" fill={skinShad} opacity="0.35"/>

      {/* ── MOUTH ── */}
      {/* Upper lip */}
      <path d={`M${100-mouthW},${upperLipY} Q${100-mouthW*0.4},${upperLipY-4} 100,${upperLipY} Q${100+mouthW*0.4},${upperLipY-4} ${100+mouthW},${upperLipY}`}
        fill={lipUpper} stroke={lipUpper} strokeWidth="0.5"/>
      {/* Cupid's bow top */}
      <path d={`M${100-mouthW},${upperLipY} Q100,${upperLipY+3} ${100+mouthW},${upperLipY}`}
        fill="none" stroke="#C05040" strokeWidth="0.5" opacity="0.5"/>

      {mouthOpen > 0.05 && <>
        {/* Inner mouth */}
        <path d={`M${100-mouthW+2},${upperLipY+2} Q100,${jawY+2} ${100+mouthW-2},${upperLipY+2}`}
          fill="#3A0808" opacity="0.85"/>
        {/* Teeth */}
        {mouthOpen > 0.15 && <path d={`M${100-mouthW+4},${upperLipY+3} Q100,${upperLipY+8} ${100+mouthW-4},${upperLipY+3}`}
          fill="white" opacity="0.9"/>}
        {/* Tongue hint */}
        {mouthOpen > 0.4 && <ellipse cx="100" cy={jawY-4} rx={mouthW*0.5} ry="4" fill="#D06060" opacity="0.7"/>}
      </>}

      {/* Lower lip */}
      <path d={`M${100-mouthW},${upperLipY} Q100,${jawY} ${100+mouthW},${upperLipY}`}
        fill={lipLower} opacity="0.9"/>
      {/* Lip shine */}
      <path d={`M${100-mouthW*0.4},${upperLipY+1} Q100,${upperLipY+2} ${100+mouthW*0.4},${upperLipY+1}`}
        stroke="rgba(255,255,255,0.5)" strokeWidth="1.5" fill="none" strokeLinecap="round"/>

      {/* ── ZZZ (sleepy) ── */}
      {isSleepy && (
        <g opacity="0.7" style={{animation:"float-particle 3s ease infinite"}}>
          <text x="148" y="80" fill={cyan} fontSize="12" fontFamily="sans-serif" fontWeight="bold">z</text>
          <text x="160" y="68" fill={cyan} fontSize="10" fontFamily="sans-serif" opacity="0.7">z</text>
          <text x="170" y="58" fill={cyan} fontSize="8" fontFamily="sans-serif" opacity="0.45">z</text>
        </g>
      )}

      {/* ── LIVE BADGE ── */}
      {isLive && (
        <g>
          <rect x="73" y="275" width="54" height="17" rx="8"
            fill="rgba(255,60,60,0.3)" stroke="rgba(255,60,60,0.6)" strokeWidth="1"
            style={{animation:"pulse-live 1.6s ease infinite"}}/>
          <circle cx="84" cy="283" r="3" fill="#FF3C3C"/>
          <text x="100" y="287" fill="#FF3C3C" fontSize="8" fontWeight="bold" textAnchor="middle" fontFamily="sans-serif" letterSpacing="1">LIVE</text>
        </g>
      )}
      {/* ── AFK badge ── */}
      {isAFK && (
        <g>
          <rect x="67" y="275" width="66" height="17" rx="8"
            fill="rgba(124,58,255,0.25)" stroke="rgba(124,58,255,0.55)" strokeWidth="1"/>
          <text x="100" y="287" fill="#7C3AFF" fontSize="8" fontWeight="bold" textAnchor="middle" fontFamily="sans-serif" letterSpacing="0.5">AFK MODE</text>
        </g>
      )}
    </svg>
  );
}

/* ══ AVATAR CANVAS ══ */
function AvatarCanvas() {
  const { avatarState, isLive, isAFKMode, isVoiceOn, isMicOn, setIsMicOn,
          chatMessages, isAIActive, lang, addToast } = useApp();
  const [bgStyle, setBgStyle] = React.useState("gradient");
  const [autoRead, setAutoRead] = React.useState(false);
  const [currentText, setCurrentText] = React.useState("");
  const [cameraAngle, setCameraAngle] = React.useState("bust");
  const { speaking, mouthOpen, speak, stop } = useSpeech();
  const micAmplitude = useMicLipSync(isMicOn);
  const lastReadRef = React.useRef(0);
  const [particles] = React.useState(() =>
    Array.from({length:14},(_, i)=>({id:i,x:8+Math.random()*84,delay:Math.random()*6,dur:4+Math.random()*4,tx:(Math.random()-0.5)*50,size:2+Math.random()*2.5}))
  );

  const liveMouth = isMicOn ? micAmplitude : mouthOpen;
  const isTalking = speaking || (isMicOn && micAmplitude > 0.05);
  const isExcited = avatarState === "excited";

  // Auto-read new chat messages in Indonesian
  React.useEffect(() => {
    if (!autoRead || !isAIActive) return;
    const latest = chatMessages[chatMessages.length - 1];
    if (!latest || latest.id === lastReadRef.current) return;
    if (latest.type !== "ai" && latest.type !== "donation") return;
    lastReadRef.current = latest.id;
    const prefix = latest.type === "donation"
      ? `Makasih banget ${latest.user} udah donasi ${latest.amount}! `
      : "";
    setTimeout(() => {
      setCurrentText(latest.text);
      speak(prefix + latest.text, () => setCurrentText(""));
    }, 400);
  }, [chatMessages, autoRead, isAIActive, speak]);

  const greetings = [
    "Halo semuanya, selamat datang di stream!",
    "Hai hai, apa kabar kalian semua?",
    "Selamat datang! Senang banget bisa ketemu kalian lagi.",
    "Halo gaes! Siap-siap buat stream yang seru hari ini!",
  ];

  const bgOptions = {
    gradient: `radial-gradient(ellipse 80% 70% at 50% 60%, rgba(0,212,255,0.08) 0%, rgba(124,58,255,0.04) 50%, transparent 100%), #080A0F`,
    dark:     `#080A0F`,
    studio:   `linear-gradient(160deg, #0D0820 0%, #080A0F 60%, #081018 100%)`,
    purple:   `radial-gradient(ellipse 80% 70% at 50% 60%, rgba(124,58,255,0.14) 0%, transparent 70%), #0A0614`,
    green:    `#021A06`,
  };

  const scaleMap = { bust:"scale(1)", face:"scale(1.3) translateY(8%)", full:"scale(0.75) translateY(-5%)" };

  return (
    <div style={{flex:1, display:"flex", flexDirection:"column", background:"var(--bg-void)", overflow:"hidden", position:"relative"}}>

      {/* Canvas area */}
      <div style={{flex:1, position:"relative", overflow:"hidden", display:"flex", alignItems:"center", justifyContent:"center"}}>
        {/* Background */}
        <div style={{position:"absolute", inset:0, background:bgOptions[bgStyle], transition:"background 0.5s"}}/>
        {/* Grid */}
        <div style={{position:"absolute", inset:0, backgroundImage:"linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px)", backgroundSize:"40px 40px", opacity:0.5}}/>
        {/* Particles */}
        {particles.map(p=>(
          <div key={p.id} style={{position:"absolute", bottom:"10%", left:`${p.x}%`, width:p.size, height:p.size, borderRadius:"50%", background:"rgba(0,212,255,0.6)", animation:`float-particle ${p.dur}s ${p.delay}s ease-in-out infinite`, "--tx":`${p.tx}px`, zIndex:1}}/>
        ))}
        {/* Live scan line */}
        {isLive && <div style={{position:"absolute", left:0, right:0, height:"2px", background:"linear-gradient(90deg,transparent,rgba(255,60,60,0.4),transparent)", animation:"scan-line 3.5s linear infinite", zIndex:2, pointerEvents:"none"}}/>}

        {/* Avatar */}
        <div style={{
          position:"relative", zIndex:3,
          transform: scaleMap[cameraAngle],
          transition:"transform 0.4s cubic-bezier(0.34,1.56,0.64,1)",
          animation: isExcited?"excited-shake 0.35s ease infinite": isTalking?"none":"breathe 3.8s ease-in-out infinite",
        }}>
          <VirtualAvatar
            state={avatarState}
            mouthOpen={liveMouth}
            isLive={isLive}
            isAFK={isAFKMode}
          />
        </div>

        {/* Current speaking text bubble */}
        {currentText && (
          <div style={{
            position:"absolute", bottom:"14%", left:"50%", transform:"translateX(-50%)",
            background:"rgba(8,10,15,0.88)", border:"1px solid var(--border-accent)",
            borderRadius:"var(--r-lg)", padding:"8px 16px",
            maxWidth:"70%", textAlign:"center",
            fontSize:"var(--text-sm)", color:"var(--text-primary)", lineHeight:1.5,
            animation:"slide-up 0.3s ease",
            backdropFilter:"blur(10px)", zIndex:10,
          }}>
            <span style={{color:"var(--accent-primary)", marginRight:"6px"}}></span>
            {currentText}
          </div>
        )}

        {/* Talking indicator */}
        {isTalking && (
          <div style={{position:"absolute", top:"12px", right:"12px", zIndex:10, display:"flex", alignItems:"center", gap:"6px", background:"rgba(0,212,255,0.12)", border:"1px solid var(--border-accent)", borderRadius:"var(--r-full)", padding:"4px 10px"}}>
            {[0,1,2].map(i=>(
              <div key={i} style={{width:3, height:3, borderRadius:"50%", background:"var(--accent-primary)", animation:`typing-bounce 0.9s ease ${i*0.15}s infinite`}}/>
            ))}
            <span style={{fontSize:"0.65rem", color:"var(--accent-primary)", fontWeight:600}}>
              {isMicOn?"MIC":"TTS"}
            </span>
          </div>
        )}

        {/* State badge */}
        <div style={{position:"absolute", top:"12px", left:"12px", zIndex:10}}>
          <EmotionTag emotion={avatarState} size="sm"/>
        </div>

        {/* Perf HUD */}
        <div style={{position:"absolute", top:"12px", right: isTalking?"80px":"12px", zIndex:10, display:"flex", flexDirection:"column", gap:"3px", alignItems:"flex-end"}}>
          <div style={{background:"rgba(8,10,15,0.75)", backdropFilter:"blur(6px)", border:"1px solid var(--border-subtle)", borderRadius:"var(--r-sm)", padding:"3px 7px", fontSize:"0.6rem", fontFamily:"var(--font-mono)", color:"var(--status-online)"}}>60 FPS</div>
          <div style={{background:"rgba(8,10,15,0.75)", backdropFilter:"blur(6px)", border:"1px solid var(--border-subtle)", borderRadius:"var(--r-sm)", padding:"3px 7px", fontSize:"0.6rem", fontFamily:"var(--font-mono)", color:"var(--text-secondary)"}}>1080p</div>
        </div>

        {/* Mic waveform */}
        {isMicOn && (
          <div style={{position:"absolute", bottom:"8%", left:"50%", transform:"translateX(-50%)", display:"flex", alignItems:"center", gap:"2px", zIndex:10}}>
            {Array.from({length:24},(_,i)=>(
              <div key={i} style={{width:"3px", borderRadius:"2px", background:"var(--accent-primary)", height: `${4 + micAmplitude * 28 * Math.abs(Math.sin(i*0.7 + Date.now()*0.01))}px`, transition:"height 0.05s", opacity:0.7}}/>
            ))}
          </div>
        )}
      </div>

      {/* ── AVATAR CONTROLS BAR ── */}
      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 14px", background:"var(--bg-surface)", borderTop:"1px solid var(--border-subtle)", flexShrink:0, flexWrap:"wrap", gap:"8px"}}>
        {/* BG picker */}
        <div style={{display:"flex", alignItems:"center", gap:"6px"}}>
          <span style={{fontSize:"var(--text-xs)", color:"var(--text-muted)", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.07em"}}>BG</span>
          {[["gradient","#00D4FF"],["dark","#1A2030"],["studio","#2A0A4A"],["purple","#3D1A7A"],["green","#003A10"]].map(([k,c])=>(
            <button key={k} onClick={()=>setBgStyle(k)} style={{width:17,height:17,borderRadius:"50%",background:k==="gradient"?"linear-gradient(135deg,#00D4FF,#7C3AFF)":c,border:bgStyle===k?`2px solid ${c}`:"1px solid var(--border-subtle)",cursor:"pointer",flexShrink:0}}/>
          ))}
        </div>

        {/* Camera angle */}
        <div style={{display:"flex", gap:"4px"}}>
          {[["face","Wajah"],["bust","Bust"],["full","Full"]].map(([k,l])=>(
            <button key={k} onClick={()=>setCameraAngle(k)} style={{padding:"3px 10px",borderRadius:"var(--r-full)",fontSize:"var(--text-xs)",fontWeight:600,fontFamily:"var(--font-display)",background:cameraAngle===k?"var(--accent-primary-glow)":"var(--bg-elevated)",border:`1px solid ${cameraAngle===k?"var(--border-accent)":"var(--border-subtle)"}`,color:cameraAngle===k?"var(--accent-primary)":"var(--text-secondary)",cursor:"pointer"}}>
              {l}
            </button>
          ))}
        </div>

        {/* Speech controls */}
        <div style={{display:"flex", gap:"6px", alignItems:"center"}}>
          {/* Quick greet */}
          <button onClick={()=>{const t=greetings[Math.floor(Math.random()*greetings.length)];setCurrentText(t);speak(t,()=>setCurrentText(""));}}
            style={{display:"flex",alignItems:"center",gap:"5px",padding:"4px 10px",borderRadius:"var(--r-full)",background:"rgba(0,212,255,0.08)",border:"1px solid var(--border-accent)",color:"var(--accent-primary)",fontSize:"var(--text-xs)",fontWeight:600,cursor:"pointer",fontFamily:"var(--font-display)"}}>
            <IcVolume2 size={12}/> {lang==="id"?"Sapa":"Greet"}
          </button>
          {/* Stop */}
          {speaking && (
            <button onClick={stop} style={{display:"flex",alignItems:"center",gap:"5px",padding:"4px 10px",borderRadius:"var(--r-full)",background:"rgba(255,60,60,0.08)",border:"1px solid rgba(255,60,60,0.3)",color:"var(--status-live)",fontSize:"var(--text-xs)",fontWeight:600,cursor:"pointer",fontFamily:"var(--font-display)"}}>
              <IcSquare size={12}/> Stop
            </button>
          )}
          {/* Auto-read chat */}
          <button onClick={()=>setAutoRead(p=>!p)} style={{display:"flex",alignItems:"center",gap:"5px",padding:"4px 10px",borderRadius:"var(--r-full)",background:autoRead?"rgba(0,255,136,0.1)":"var(--bg-elevated)",border:`1px solid ${autoRead?"rgba(0,255,136,0.3)":"var(--border-subtle)"}`,color:autoRead?"var(--status-online)":"var(--text-muted)",fontSize:"var(--text-xs)",fontWeight:600,cursor:"pointer",fontFamily:"var(--font-display)"}}>
            <IcMessageSquare size={12}/> {lang==="id"?"Auto Baca":"Auto Read"} {autoRead?"ON":"OFF"}
          </button>
          {/* Mic toggle */}
          <button onClick={()=>{setIsMicOn(p=>!p);if(!isMicOn)addToast(lang==="id"?"Mikrofon aktif — lipsync real-time!":"Mic active — real-time lipsync!","success");}} style={{display:"flex",alignItems:"center",gap:"5px",padding:"4px 10px",borderRadius:"var(--r-full)",background:isMicOn?"rgba(124,58,255,0.15)":"var(--bg-elevated)",border:`1px solid ${isMicOn?"rgba(124,58,255,0.4)":"var(--border-subtle)"}`,color:isMicOn?"#7C3AFF":"var(--text-muted)",fontSize:"var(--text-xs)",fontWeight:600,cursor:"pointer",fontFamily:"var(--font-display)"}}>
            {isMicOn?<IcMic size={12}/>:<IcMicOff size={12}/>} {lang==="id"?"Mic":"Mic"} {isMicOn?"ON":"OFF"}
          </button>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { AvatarCanvas });

</script>

    </div>

  const [speed, setSpeed]   = React.useState(1.0);
  const [pitch, setPitch]   = React.useState(1.0);
  const [stability, setStability] = React.useState(0.75);
  const [engine, setEngine] = React.useState("elevenlabs");
  const [speaking, setSpeaking] = React.useState(false);
  const [preset, setPreset]  = React.useState("natural");
  const [uploadStep, setUploadStep] = React.useState(0);

  const presets = {
    natural:  { label:lang==="id"?"Natural":"Natural",    speed:1.0, pitch:1.0, stability:0.75 },
    excited:  { label:lang==="id"?"Excited":"Excited",    speed:1.2, pitch:1.1, stability:0.5  },
    calm:     { label:lang==="id"?"Tenang":"Calm",        speed:0.9, pitch:0.95,stability:0.9  },
    whisper:  { label:lang==="id"?"Bisikan":"Whisper",    speed:0.85,pitch:0.9, stability:0.95 },
    dramatic: { label:lang==="id"?"Dramatik":"Dramatic",  speed:0.8, pitch:0.85,stability:0.6  },
  };

  const applyPreset = (key) => {
    const p = presets[key]; setPreset(key);
    setSpeed(p.speed); setPitch(p.pitch); setStability(p.stability);
  };

  const speak = () => {
    if (!ttsText.trim()) return;
    setSpeaking(true);
    if (window.speechSynthesis) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(ttsText);
      u.lang = lang==="id"?"id-ID":"en-US";
      u.rate = speed; u.pitch = pitch;
      u.onend = () => setSpeaking(false);
      u.onerror = () => setSpeaking(false);
      window.speechSynthesis.speak(u);
    } else {
      setTimeout(()=>setSpeaking(false), 2000);
    }
  };

  const stopSpeak = () => { window.speechSynthesis?.cancel(); setSpeaking(false); };

  return (
    <div style={{flex:1, overflow:"auto", padding:"24px", background:"var(--bg-base)"}}>
      <div style={{maxWidth:"1100px", margin:"0 auto", display:"flex", flexDirection:"column", gap:"20px"}}>
        <div>
          <h1 style={{fontSize:"var(--text-2xl)", fontWeight:800, letterSpacing:"-0.02em"}}>[MIC]️ Voice Lab</h1>
          <p style={{color:"var(--text-secondary)", fontSize:"var(--text-sm)", marginTop:"4px"}}>{lang==="id"?"Clone suara, tes TTS, dan atur parameter suara avatar":"Clone voice, test TTS, and configure avatar voice parameters"}</p>
        </div>

        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:"16px"}}>
          {/* TTS Console */}
          <div style={{display:"flex", flexDirection:"column", gap:"14px"}}>
            <Panel title={lang==="id"?"Konsol TTS":"TTS Console"} icon={<IcVolume2 size={13}/>}>
              <div style={{padding:"16px", display:"flex", flexDirection:"column", gap:"12px"}}>
                <FormField label={lang==="id"?"Engine TTS":"TTS Engine"}>
                  <Select value={engine} onChange={setEngine} options={[
                    {value:"elevenlabs", label:"ElevenLabs (Recommended)"},
                    {value:"browser",    label:lang==="id"?"Browser Native (Gratis)":"Browser Native (Free)"},
                    {value:"gtts",       label:"Google TTS"},
                  ]}/>
                </FormField>
                <FormField label={lang==="id"?"Teks untuk diucapkan":"Text to speak"}>
                  <Textarea value={ttsText} onChange={setTtsText} rows={4} placeholder={lang==="id"?"Ketik teks di sini...":"Type text here..."}/>
                </FormField>

                {/* Waveform visualizer mock */}
                <div style={{background:"var(--bg-void)", borderRadius:"var(--r-md)", padding:"12px", height:"56px", display:"flex", alignItems:"center", gap:"2px", overflow:"hidden", border:"1px solid var(--border-subtle)"}}>
                  {Array.from({length:48},(_, i)=>(
                    <div key={i} style={{
                      flex:1, borderRadius:"2px",
                      background: speaking ? `rgba(0,212,255,${0.2+Math.abs(Math.sin(i*0.5))*0.7})` : "rgba(255,255,255,0.06)",
                      height: speaking ? `${20+Math.abs(Math.sin(i*0.5+Date.now()/200))*70}%` : `${10+Math.abs(Math.sin(i*0.8))*25}%`,
                      transition: speaking?"height 0.1s ease":"none",
                      minHeight:"4px",
                    }}/>
                  ))}
                </div>

                <div style={{display:"flex", gap:"8px"}}>
                  <Button variant={speaking?"danger":"primary"} icon={speaking?<IcSquare/>:<IcPlay/>} fullWidth
                    onClick={speaking?stopSpeak:speak}>
                    {speaking?(lang==="id"?"Hentikan":"Stop"):(lang==="id"?"Ucapkan":"Speak")}
                  </Button>
                  <IconButton icon={<IcRefreshCw/>} tooltip={lang==="id"?"Reset teks":"Reset text"} onClick={()=>setTtsText("")}/>
                </div>
              </div>
            </Panel>

            {/* Voice presets */}
            <Panel title={lang==="id"?"Preset Suara":"Voice Presets"} icon={<IcSliders size={13}/>}>
              <div style={{padding:"10px 16px", display:"flex", flexWrap:"wrap", gap:"6px"}}>
                {Object.entries(presets).map(([key,p])=>(
                  <Chip key={key} selected={preset===key} onClick={()=>applyPreset(key)}>{p.label}</Chip>
                ))}
              </div>
            </Panel>
          </div>

          {/* Voice parameters + clone */}
          <div style={{display:"flex", flexDirection:"column", gap:"14px"}}>
            <Panel title={lang==="id"?"Parameter Suara":"Voice Parameters"} icon={<IcActivity size={13}/>}>
              <div style={{padding:"16px", display:"flex", flexDirection:"column", gap:"14px"}}>
                <FormField label={`${lang==="id"?"Kecepatan":"Speed"}: ${speed.toFixed(2)}x`}>
                  <RangeSlider value={speed*50} onChange={v=>setSpeed(v/50)} min={25} max={100} color="var(--accent-primary)" valueLabel={`${speed.toFixed(1)}x`}/>
                </FormField>
                <FormField label={`${lang==="id"?"Nada":"Pitch"}: ${pitch.toFixed(2)}`}>
                  <RangeSlider value={pitch*50} onChange={v=>setPitch(v/50)} min={25} max={100} color="#7C3AFF" valueLabel={pitch.toFixed(2)}/>
                </FormField>
                <FormField label={`${lang==="id"?"Stabilitas":"Stability"}: ${(stability*100).toFixed(0)}%`}>
                  <RangeSlider value={stability*100} onChange={v=>setStability(v/100)} min={0} max={100} color="#00FF88" valueLabel={`${(stability*100).toFixed(0)}%`}/>
                </FormField>
                <div style={{padding:"10px 12px", background:"var(--bg-elevated)", borderRadius:"var(--r-md)", border:"1px solid var(--border-subtle)", display:"flex", justifyContent:"space-between"}}>
                  <span style={{fontSize:"var(--text-xs)", color:"var(--text-muted)"}}>{lang==="id"?"Estimasi latensi":"Est. latency"}</span>
                  <span style={{fontSize:"var(--text-xs)", color:"var(--status-online)", fontFamily:"var(--font-mono)", fontWeight:700}}>~{engine==="browser"?"80":"320"}ms</span>
                </div>
              </div>
            </Panel>

            {/* Voice Clone wizard */}
            <Panel title={lang==="id"?"Clone Suara":"Voice Clone"} icon={<IcMic size={13}/>}
              actions={<Badge variant="secondary" size="xs">ElevenLabs</Badge>}>
              <div style={{padding:"16px", display:"flex", flexDirection:"column", gap:"12px"}}>
                {uploadStep===0 && (
                  <div style={{border:"2px dashed var(--border-accent)", borderRadius:"var(--r-md)", padding:"24px", textAlign:"center", background:"var(--accent-primary-glow)", cursor:"pointer"}}
                    onClick={()=>setUploadStep(1)}>
                    <div style={{fontSize:"2rem", marginBottom:"6px"}}>[MIC2]</div>
                    <div style={{fontSize:"var(--text-sm)", fontWeight:600}}>{lang==="id"?"Upload sampel suara (30 detik)":"Upload voice sample (30 seconds)"}</div>
                    <div style={{fontSize:"var(--text-xs)", color:"var(--text-muted)", marginTop:"4px"}}>MP3, WAV, M4A</div>
                  </div>
                )}
                {uploadStep===1 && (
                  <div style={{display:"flex", flexDirection:"column", gap:"10px", animation:"slide-up 0.25s ease both"}}>
                    <div style={{display:"flex", alignItems:"center", gap:"8px", padding:"10px 12px", background:"rgba(0,255,136,0.08)", borderRadius:"var(--r-md)", border:"1px solid rgba(0,255,136,0.2)"}}>
                      <IcCheck size={14} color="var(--status-online)"/>
                      <span style={{fontSize:"var(--text-xs)", color:"var(--status-online)", fontWeight:600}}>voice_sample.mp3 — 32s</span>
                    </div>
                    <ProgressBar value={75} animated glow color="#7C3AFF" height={6}/>
                    <div style={{fontSize:"var(--text-xs)", color:"var(--text-muted)", textAlign:"center"}}>{lang==="id"?"Memproses clone suara...":"Processing voice clone..."}</div>
                    <Button variant="primary" size="sm" onClick={()=>{setUploadStep(2);addToast(lang==="id"?"Voice clone berhasil dibuat!":"Voice clone created!","success");}}>
                      {lang==="id"?"Simulasikan Selesai":"Simulate Complete"}
                    </Button>
                  </div>
                )}
                {uploadStep===2 && (
                  <div style={{display:"flex", flexDirection:"column", gap:"8px", animation:"bounce-in 0.4s ease"}}>
                    <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 14px", background:"rgba(124,58,255,0.1)", borderRadius:"var(--r-md)", border:"1px solid rgba(124,58,255,0.3)"}}>
                      <div style={{display:"flex", alignItems:"center", gap:"8px"}}>
                        <AvatarCircle name="NB" size={28} color="#7C3AFF"/>
                        <div>
                          <div style={{fontSize:"var(--text-sm)", fontWeight:700, color:"#7C3AFF"}}>nayrbryan_clone</div>
                          <div style={{fontSize:"0.65rem", color:"var(--text-muted)"}}>ID: EL-a3f9c2...</div>
                        </div>
                      </div>
                      <Badge variant="secondary" size="xs">ACTIVE</Badge>
                    </div>
                    <Button variant="outline" size="sm" icon={<IcPlay/>} onClick={speak}>{lang==="id"?"Test Clone":"Test Clone"}</Button>
                    <Button variant="ghost" size="sm" onClick={()=>setUploadStep(0)}>{lang==="id"?"Ganti Suara":"Replace Voice"}</Button>
                  </div>
                )}
              </div>
            </Panel>
          </div>
        </div>
      </div>
    </div>
  );
}

                >
                  <div style={{width:6, height:32, borderRadius:"3px", background:activeScene===s.id?s.color:"var(--border-normal)", flexShrink:0, transition:"background var(--t-fast)"}}/>

                  {activeScene===s.id && <Badge variant="primary" size="xs">LIVE</Badge>}

          {/* Scene detail */}
          <div style={{display:"flex", flexDirection:"column", gap:"14px"}}>

            {/* Sources */}

              actions={<Select value={transition} onChange={setTransition} options={[{value:"cut",label:"Cut"},{value:"fade",label:"Fade"},{value:"swipe",label:"Swipe"}]} style={{width:"100px"}}/>}>
              <div style={{padding:"8px 16px", display:"flex", flexDirection:"column", gap:"4px"}}>
                {currentScene?.sources.map((src,i)=>(
                  <div key={src} style={{display:"flex", alignItems:"center", gap:"10px", padding:"8px", borderRadius:"var(--r-sm)", background:"var(--bg-elevated)", border:"1px solid var(--border-subtle)"}}>
                    <Toggle checked={sourceVis[src]??true} onChange={v=>setSourceVis(p=>({...p,[src]:v}))} size="sm"/>
                    <div style={{flex:1}}>
                      <span style={{fontSize:"var(--text-sm)", fontWeight:500, color:sourceVis[src]??true?"var(--text-primary)":"var(--text-muted)"}}>{src}</span>
                    </div>
                    <div style={{display:"flex", gap:"4px"}}>
                      <IconButton icon={<IcSliders size={11}/>} size="sm" tooltip="Settings"/>

            {/* Quick switch */}
            <div style={{display:"flex", gap:"8px", flexWrap:"wrap"}}>
              {scenes.map(s=>(
                <Button key={s.id} variant={activeScene===s.id?"primary":"surface"} size="sm" onClick={()=>switchScene(s.id)} style={{borderColor:activeScene===s.id?"var(--border-accent)":`${s.color}30`}}>
                  {s.label}
                </Button>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function IcShield({ size=16, color="currentColor" }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
}

function SchedulePage() {
  const { lang, addToast } = useApp();
  const days = lang==="id"?["Sen","Sel","Rab","Kam","Jum","Sab","Min"]:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const [schedule, setSchedule] = React.useState([
    { day:0, active:false, start:"19:00", end:"22:00", title:""     },
    { day:1, active:true,  start:"20:00", end:"23:00", title:lang==="id"?"Gaming Malam":"Night Gaming" },
    { day:2, active:false, start:"19:00", end:"21:00", title:""     },
    { day:3, active:true,  start:"20:00", end:"22:00", title:lang==="id"?"Ngobrol Santai":"Chill Chat" },
    { day:4, active:false, start:"19:00", end:"22:00", title:""     },
    { day:5, active:true,  start:"15:00", end:"20:00", title:lang==="id"?"Weekend Special":"Weekend Special" },
    { day:6, active:true,  start:"16:00", end:"19:00", title:lang==="id"?"Stream Santai":"Chill Stream" },
  ]);
  const [autoStart, setAutoStart] = React.useState(false);
  const [reminder, setReminder] = React.useState(15);
  const [timezone, setTimezone] = React.useState("Asia/Jakarta");

  const toggle = (i) => setSchedule(p=>p.map((s,j)=>j===i?{...s,active:!s.active}:s));

  const totalHours = schedule.filter(s=>s.active).reduce((acc,s)=>{
    const [sh,sm]=s.start.split(":").map(Number), [eh,em]=s.end.split(":").map(Number);
    return acc + (eh-sh) + (em-sm)/60;
  }, 0);

  return (
    <div style={{flex:1, overflow:"auto", padding:"24px", background:"var(--bg-base)"}}>
      <div style={{maxWidth:"900px", margin:"0 auto", display:"flex", flexDirection:"column", gap:"20px"}}>

            <p style={{color:"var(--text-secondary)", fontSize:"var(--text-sm)", marginTop:"4px"}}>{lang==="id"?"Atur jadwal dan auto-start stream mingguan":"Set weekly stream schedule and auto-start"}</p>
          </div>
          <div style={{display:"flex", gap:"6px", alignItems:"center"}}>
            <Tag color="cyan">{totalHours.toFixed(1)}h/{lang==="id"?"minggu":"week"}</Tag>

          </div>
        </div>

        <div style={{display:"grid", gridTemplateColumns:"1fr 280px", gap:"16px"}}>
          {/* Weekly grid */}
          <Panel title={lang==="id"?"Jadwal Mingguan":"Weekly Schedule"} icon={<IcClock size={13}/>}>
            <div style={{padding:"8px 16px", display:"flex", flexDirection:"column", gap:"4px"}}>
              {schedule.map((s,i)=>(
                <div key={i} style={{display:"flex", alignItems:"center", gap:"12px", padding:"10px 8px", borderRadius:"var(--r-sm)", background:s.active?"var(--accent-primary-glow)":"var(--bg-elevated)", border:`1px solid ${s.active?"var(--border-accent)":"var(--border-subtle)"}`, transition:"all var(--t-fast)"}}>
                  <Toggle checked={s.active} onChange={()=>toggle(i)} size="sm"/>
                  <div style={{width:"32px", fontWeight:700, fontSize:"var(--text-sm)", color:s.active?"var(--accent-primary)":"var(--text-muted)", flexShrink:0}}>{days[i]}</div>
