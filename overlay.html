<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlterCast — OBS Overlay</title>
  <link rel="stylesheet" href="assets/styles/tokens.css">
  <style>
    /* Transparent background for OBS browser source.
       Add ?transparent=1 to URL → fully transparent. */
    html, body {
      background: transparent !important;
      overflow: hidden;
    }
    body { background: transparent; }
    #webgl-canvas {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh;
      display: block;
    }
    #watermark {
      position: fixed;
      bottom: 12px; right: 14px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: rgba(255,255,255,.35);
      letter-spacing: .12em;
      text-transform: uppercase;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,.6);
    }
    #watermark b { color: rgba(0,212,255,.7); font-weight: 600; }
    .config-panel {
      position: fixed;
      top: 12px; right: 12px;
      background: rgba(8,10,15,.85);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-md);
      padding: 8px 12px;
      font-size: 11px;
      color: var(--text-secondary);
      display: flex; gap: 8px; align-items: center;
      z-index: 100;
    }
    .config-panel.hidden { display: none; }
    .config-panel button {
      background: var(--bg-overlay);
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      padding: 4px 10px;
      border-radius: var(--r-sm);
      font-size: 10px;
      cursor: pointer;
    }
    .config-panel button:hover { background: var(--accent-primary-glow); color: var(--accent-primary); }
  </style>
</head>
<body>

  <canvas id="webgl-canvas"></canvas>

  <div id="watermark">Powered by <b>AlterCast</b></div>

  <div class="config-panel" id="config">
    <span>OBS Overlay</span>
    <button id="cycle-avatar">Avatar</button>
    <button id="cycle-emo">Emosi</button>
    <button id="cycle-light">Cahaya</button>
    <button id="hide-config">Hide</button>
  </div>

  <script type="module">
    import { EngineBridge } from "./app/engine-bridge.js";
    import { store, AVATARS, EMOTIONS, LIGHTING_PRESETS } from "./app/store.js";

    const canvas = document.getElementById("webgl-canvas");
    const bridge = new EngineBridge(canvas);

    /* Parse URL params */
    const params = new URLSearchParams(window.location.search);
    if (params.get("avatar")) store.set("currentAvatar", params.get("avatar"));
    if (params.get("emotion")) store.set("emotion", params.get("emotion"));
    if (params.get("light")) store.set("lightingPreset", params.get("light"));

    await bridge.boot();

    /* postMessage bridge so studio.html can drive this overlay window */
    window.addEventListener("message", (e) => {
      const d = e.data || {};
      if (d.type === "setEmotion") store.set("emotion", d.emotion);
      if (d.type === "selectAvatar") store.set("currentAvatar", d.id);
      if (d.type === "setLighting") store.set("lightingPreset", d.preset);
      if (d.type === "setRotation") bridge.engine.setRotation(d.rx || 0, d.ry || 0);
      if (d.type === "speak" && d.text) {
        /* No TTS in overlay (audio in OBS) — just mouth pump */
        const dur = Math.max(1500, d.text.length * 75);
        const start = performance.now();
        const tick = () => {
          const t = performance.now() - start;
          if (t < dur) {
            const open = .35 + .30 * Math.sin(t*.022) + .25 * Math.sin(t*.045);
            store.set("mouthOpen", Math.max(.15, Math.min(1, open)));
            requestAnimationFrame(tick);
          } else {
            store.set("mouthOpen", 0);
          }
        };
        tick();
      }
    });

    /* Mock mouth animation for testing */
    let mockTalk = false;
    document.addEventListener("keydown", (e) => {
      if (e.key === " ") mockTalk = !mockTalk;
    });

    /* Quick controls */
    let avList = Object.keys(AVATARS);
    let emoList = Object.keys(EMOTIONS);
    let lightList = Object.keys(LIGHTING_PRESETS);
    document.getElementById("cycle-avatar").onclick = () => {
      const i = avList.indexOf(store.get("currentAvatar"));
      store.set("currentAvatar", avList[(i + 1) % avList.length]);
    };
    document.getElementById("cycle-emo").onclick = () => {
      const i = emoList.indexOf(store.get("emotion"));
      store.set("emotion", emoList[(i + 1) % emoList.length]);
    };
    document.getElementById("cycle-light").onclick = () => {
      const i = lightList.indexOf(store.get("lightingPreset"));
      store.set("lightingPreset", lightList[(i + 1) % lightList.length]);
    };
    document.getElementById("hide-config").onclick = () => {
      document.getElementById("config").classList.add("hidden");
    };

    /* Hide config if URL has ?clean=1 */
    if (params.get("clean") === "1") {
      document.getElementById("config").classList.add("hidden");
      document.getElementById("watermark").style.display = "none";
    }

    /* Mouse-follow for live tracking even in OBS */
    const M = { tx: 0, ty: 0, x: 0, y: 0 };
    window.addEventListener("mousemove", e => { M.tx = e.clientX; M.ty = e.clientY; });

    function loop(ts) {
      requestAnimationFrame(loop);
      const t = ts / 1000;
      M.x += (M.tx - M.x) * .06;
      M.y += (M.ty - M.y) * .06;

      const nx = (M.tx / window.innerWidth - .5) * 2;
      const ny = (M.ty / window.innerHeight - .5) * 2;
      bridge.engine.setHeadLook(ny * 0.18, nx * 0.3);
      bridge.engine.setEyeLook(nx * 0.8, ny * 0.6);

      if (mockTalk) {
        const open = .35 + .30 * Math.sin(ts*.012) + .25 * Math.sin(ts*.025);
        store.set("mouthOpen", Math.max(.15, Math.min(1, open)));
      }

      bridge.render(t);
    }
    requestAnimationFrame(loop);
  </script>

</body>
</html>
