<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlterCast — Avatar Creator</title>
  <link rel="stylesheet" href="assets/styles/tokens.css">
  <link rel="stylesheet" href="assets/styles/studio.css">
  <style>
    body { overflow-y: auto; }
    html, body { height: auto; min-height: 100vh; }
    .avatar-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px;
      display: grid;
      grid-template-columns: 320px 1fr 320px;
      gap: 20px;
    }
    .panel-card {
      background: var(--panel);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-lg);
      padding: 20px;
    }
    .panel-card h3 {
      font-size: 13px;
      font-weight: var(--fw-bold);
      letter-spacing: var(--ls-widest);
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .upload-area {
      border: 2px dashed var(--border-accent);
      border-radius: var(--r-lg);
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: all var(--t-fast);
      background: var(--accent-primary-glow);
    }
    .upload-area:hover { background: var(--accent-primary-glow-lg); }
    .upload-area input { display: none; }
    .upload-area .icon { font-size: 32px; color: var(--accent-primary); margin-bottom: 12px; }
    .upload-area .label { font-size: 14px; font-weight: var(--fw-semibold); margin-bottom: 4px; }
    .upload-area .hint { font-size: 12px; color: var(--text-muted); }
    .creator-stage {
      background: var(--bg-base);
      border-radius: var(--r-xl);
      border: 1px solid var(--border-accent);
      box-shadow: var(--shadow-glow-cyan);
      position: relative;
      aspect-ratio: 3/4;
      overflow: hidden;
    }
    .creator-stage canvas { width: 100%; height: 100%; display: block; }
    .creator-stage canvas#bg-canvas, .creator-stage canvas#particles-canvas {
      position: absolute; inset: 0; pointer-events: none;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: var(--ls-wider);
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg-overlay);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-sm);
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent-primary); }

    .avatar-list { display: flex; flex-direction: column; gap: 8px; }
    .avatar-list .av-card { width: 100%; }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      border-radius: var(--r-md);
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      font-size: 13px;
      text-decoration: none;
      margin-bottom: 16px;
    }
    .back-link:hover { color: var(--text-primary); border-color: var(--border-accent); }

    @media (max-width: 1024px) {
      .avatar-page { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body style="background:var(--bg-base);">

  <div class="avatar-page">
    <div>
      <a class="back-link" href="studio.html">← Kembali ke Studio</a>
      <div class="panel-card">
        <h3>Library</h3>
        <div class="avatar-list" id="avatar-list"></div>
      </div>
    </div>

    <div>
      <div class="creator-stage">
        <canvas id="bg-canvas"></canvas>
        <canvas id="webgl-canvas"></canvas>
        <canvas id="particles-canvas"></canvas>
      </div>
    </div>

    <div>
      <div class="panel-card">
        <h3>Upload Foto</h3>
        <div class="upload-area" id="upload-area">
          <input type="file" id="upload-file" accept="image/*">
          <div class="icon">📤</div>
          <div class="label">Pilih atau drop foto wajah</div>
          <div class="hint">Foto frontal, latar polos terbaik. PNG/JPG max 5MB.</div>
        </div>
      </div>

      <div class="panel-card" style="margin-top:16px">
        <h3>Konfigurasi Avatar</h3>
        <div class="field">
          <label>Nama karakter</label>
          <input type="text" id="char-name" value="Custom" placeholder="Misal: Sari, Bayu...">
        </div>
        <div class="field">
          <label>Threshold latar (auto-remove)</label>
          <input type="range" min="80" max="100" value="96" id="bg-thresh">
        </div>
        <div class="field">
          <label>Skala wajah Y</label>
          <input type="range" min="80" max="130" value="100" id="face-y">
        </div>
        <div class="field">
          <label>Warna iris</label>
          <input type="color" id="iris-color" value="#2A1F18">
        </div>
        <button class="cta primary" style="width:100%;margin-top:8px;" id="apply-btn">Terapkan</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { EngineBridge } from "./app/engine-bridge.js";
    import { Atmosphere } from "./app/atmosphere.js";
    import { store, AVATARS } from "./app/store.js";

    const bridge = new EngineBridge(document.getElementById("webgl-canvas"));
    const atmosphere = new Atmosphere(document.getElementById("bg-canvas"), document.getElementById("particles-canvas"));
    await bridge.boot();
    store.set("lightingPreset", "studio");

    /* Render avatar list */
    function refreshList() {
      const list = document.getElementById("avatar-list");
      list.innerHTML = "";
      Object.entries(AVATARS).forEach(([id, av]) => {
        const card = document.createElement("div");
        card.className = "av-card" + (id === store.get("currentAvatar") ? " active" : "");
        card.innerHTML = `
          <div class="av-thumb"><img src="${av.src}" alt=""></div>
          <div class="av-meta"><div class="av-name">${av.name}</div><div class="av-tag">${av.tag || "user upload"}</div></div>
        `;
        card.addEventListener("click", () => {
          store.set("currentAvatar", id);
          refreshList();
        });
        list.appendChild(card);
      });
    }
    refreshList();

    /* Render loop */
    function loop(ts) {
      requestAnimationFrame(loop);
      const t = ts / 1000;
      bridge.engine.setRotation(0, Math.sin(t * 0.3) * 0.4);
      atmosphere.render(t);
      bridge.render(t);
    }
    requestAnimationFrame(loop);

    /* Upload */
    const uploadArea = document.getElementById("upload-area");
    const fileInput = document.getElementById("upload-file");
    uploadArea.addEventListener("click", () => fileInput.click());

    let pendingFile = null;
    fileInput.addEventListener("change", (e) => {
      pendingFile = e.target.files[0];
      if (pendingFile) {
        uploadArea.querySelector(".label").textContent = pendingFile.name;
        uploadArea.querySelector(".hint").textContent = "Klik 'Terapkan' untuk render";
      }
    });

    /* Drag & drop */
    ["dragover", "dragenter"].forEach(ev => uploadArea.addEventListener(ev, e => {
      e.preventDefault();
      uploadArea.style.background = "var(--accent-primary-glow-lg)";
    }));
    ["dragleave", "drop"].forEach(ev => uploadArea.addEventListener(ev, e => {
      e.preventDefault();
      uploadArea.style.background = "";
    }));
    uploadArea.addEventListener("drop", (e) => {
      pendingFile = e.dataTransfer.files[0];
      if (pendingFile) {
        uploadArea.querySelector(".label").textContent = pendingFile.name;
        uploadArea.querySelector(".hint").textContent = "Klik 'Terapkan' untuk render";
      }
    });

    /* Apply */
    document.getElementById("apply-btn").addEventListener("click", async () => {
      if (!pendingFile) {
        alert("Pilih foto dulu");
        return;
      }
      const url = URL.createObjectURL(pendingFile);
      const id = "custom_" + Date.now();
      const name = document.getElementById("char-name").value || "Custom";
      const bgT = +document.getElementById("bg-thresh").value / 100;
      const fy = +document.getElementById("face-y").value / 100;
      const irisHex = document.getElementById("iris-color").value;
      const r = parseInt(irisHex.slice(1,3),16)/255;
      const g = parseInt(irisHex.slice(3,5),16)/255;
      const b = parseInt(irisHex.slice(5,7),16)/255;

      try {
        await bridge.engine.addAvatar(id, url, {
          bgThreshold: bgT,
          faceScaleY: fy,
          irisColor: [r, g, b],
          samples: { skin: [[.5,.4]], hair: [[.5,.2]], body: [[.5,.85]] },
        });
        AVATARS[id] = { id, src: url, name, tag: "user upload", statusKey: "CUSTOM" };
        store.set("currentAvatar", id);
        refreshList();
      } catch (err) {
        console.error(err);
        alert("Gagal: " + err.message);
      }
    });
  </script>

</body>
</html>
